<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TANKSTER - Battle Arena</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0a0a0a; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        canvas { display: block; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 10; }
        .interactive { pointer-events: auto; }
        .panel { background: rgba(20, 20, 20, 0.9); padding: 30px; border: 2px solid #444; border-radius: 12px; box-shadow: 0 0 30px #000; }
        
        #menu, #lobby, #match-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; gap: 15px; min-width: 350px; }
        input, select, button { padding: 12px; font-size: 16px; background: #222; color: #fff; border: 1px solid #555; border-radius: 6px; }
        button { cursor: pointer; background: #3a3a3a; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #555; }
        #btnHost { background: #c0392b; border: none; }
        #btnHost:hover { background: #e74c3c; }
        
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; display: none; }
        .hud-top { display: flex; justify-content: center; font-size: 28px; font-weight: bold; text-shadow: 2px 2px 4px #000; color: #f1c40f; }
        
        .hud-center { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            text-align: center;
        }
        .weapon-label { font-size: 24px; font-weight: bold; color: #e74c3c; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(231, 76, 60, 0.5); }
        .reload-status { font-size: 14px; color: #aaa; font-weight: bold; }
        
        .loader-container { position: relative; width: 70px; height: 70px; }
        .loader-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .loader-bg { fill: none; stroke: #222; stroke-width: 6; }
        .loader-fill { fill: none; stroke: #2ecc71; stroke-width: 6; stroke-dasharray: 201; stroke-dashoffset: 201; transition: stroke-dashoffset 0.1s linear; }

        #minimap-container { position: absolute; bottom: 20px; right: 20px; width: 180px; height: 180px; border: 2px solid #555; background: rgba(0,0,0,0.7); border-radius: 8px; overflow: hidden; }
        #minimap { width: 100%; height: 100%; }

        .copy-badge { background: #27ae60; padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; margin-left: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer">
        <div id="menu" class="panel interactive">
            <h1 style="margin:0; color:#e74c3c;">TANKSTER</h1>
            <p style="text-align:center; margin-bottom:10px; color:#888;">Battle Arena</p>
            <label>Pelaajan nimi:</label>
            <input type="text" id="playerName" value="Pelaaja">
            <label>Karttasiemen (Seed):</label>
            <input type="text" id="mapSeed" value="Arena1">
            <hr style="width:100%; border-color:#333;">
            <button id="btnHost">LUO PELI (HOST)</button>
            <div style="display:flex; gap:5px;">
                <input type="text" id="hostIdInput" placeholder="Syötä Host ID" style="flex:1;">
                <button id="btnJoin">LIITY</button>
            </div>
            <p id="menuStatus" style="color: #f1c40f; text-align: center; font-size: 14px;"></p>
        </div>

        <div id="lobby" class="panel interactive hidden">
            <h2>AULA</h2>
            <p style="text-align:center;">ID: <strong id="displayHostId" style="color: #2ecc71;"></strong> 
            <span class="copy-badge" id="btnCopyId">KOPIOI</span></p>
            <div id="playerList" style="margin: 10px 0;"></div>
            <button id="btnStartGame" style="background:#27ae60; color:white;">ALOITA TAISTELU</button>
        </div>

        <div id="hud">
            <div class="hud-top" id="scoreBoard">P1: 0 | P2: 0</div>
            
            <div class="hud-center">
                <div id="weaponDisplay" class="weapon-label">ODOTETAAN...</div>
                <div class="loader-container">
                    <svg class="loader-svg">
                        <circle class="loader-bg" cx="35" cy="35" r="32"></circle>
                        <circle id="reload-circle" class="loader-fill" cx="35" cy="35" r="32"></circle>
                    </svg>
                </div>
                <div id="reload-text" class="reload-status">READY</div>
            </div>

            <div id="minimap-container">
                <canvas id="minimap"></canvas>
            </div>
        </div>

        <div id="match-over" class="panel interactive hidden">
            <h1 id="winnerText">VOITTO!</h1>
            <button id="btnBackToMenu">Palaa valikkoon</button>
        </div>
    </div>

<script>
/** * KONFIGURAATIO */
const WORLD_SIZE = 2500;
const TANK_COLORS = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f'];
const WEAPONS = [
    { id: 1, name: "Konekivääri", damage: 4, speed: 25, reload: 120, recoil: 1, radius: 2, shake: 1 },
    { id: 2, name: "20mm Tykki", damage: 20, speed: 20, reload: 600, recoil: 4, radius: 5, shake: 3 },
    { id: 3, name: "50mm Kanuuna", damage: 45, speed: 16, reload: 1400, recoil: 10, radius: 8, shake: 8 },
    { id: 4, name: "150mm JÄTTI", damage: 95, speed: 11, reload: 3800, recoil: 25, radius: 12, shake: 20 }
];

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const minimap = document.getElementById('minimap');
const mctx = minimap.getContext('2d');
let cw = canvas.width = window.innerWidth;
let ch = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
    cw = canvas.width = window.innerWidth;
    ch = canvas.height = window.innerHeight;
});

function mulberry32(a) {
    return function() {
      var t = a += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }
}
function hashString(str) {
    let h = 1779033703 ^ str.length;
    for(let i = 0; i < str.length; i++) {
        h = Math.imul(h ^ str.charCodeAt(i), 3432918353); h = h << 13 | h >>> 19;
    }
    return h;
}

let gameState = {
    status: 'menu',
    tanks: {},
    bullets: [],
    particles: [],
    obstacles: [],
    scores: {},
    roundActive: false
};

let localInput = { w: false, a: false, s: false, d: false, mx: 0, my: 0, shoot: false, weapon: 1 };
let localPlayerId = null;
let camera = { x: 1250, y: 1250, shake: 0 };
let lastTime = performance.now();
let peer = null;
let isHost = false;
let connections = {};
let hostConn = null;

/** * VERKKO JA LOBBY */
function initPeer(callback) {
    document.getElementById('menuStatus').innerText = "Yhdistetään...";
    peer = new Peer();
    peer.on('open', (id) => {
        localPlayerId = id;
        document.getElementById('menuStatus').innerText = "Yhteys valmis.";
        callback();
    });
}

document.getElementById('btnHost').onclick = () => {
    initPeer(() => {
        isHost = true;
        gameState.status = 'lobby';
        generateMap(document.getElementById('mapSeed').value);
        addPlayer(localPlayerId, document.getElementById('playerName').value, 0);
        document.getElementById('displayHostId').innerText = localPlayerId;
        updateLobbyUI();
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('lobby').classList.remove('hidden');

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.type === 'join') {
                    connections[conn.peer] = conn;
                    addPlayer(conn.peer, data.name, Object.keys(gameState.tanks).length);
                    updateLobbyUI();
                    broadcast({ type: 'lobbyUpdate', tanks: gameState.tanks });
                } else if (data.type === 'input') {
                    if(gameState.tanks[conn.peer]) gameState.tanks[conn.peer].input = data.input;
                }
            });
        });
    });
};

document.getElementById('btnJoin').onclick = () => {
    const id = document.getElementById('hostIdInput').value;
    if(!id) return;
    initPeer(() => {
        hostConn = peer.connect(id);
        hostConn.on('open', () => {
            hostConn.send({ type: 'join', name: document.getElementById('playerName').value });
        });
        hostConn.on('data', (data) => {
            if(data.type === 'lobbyUpdate') {
                gameState.tanks = data.tanks;
                updateLobbyUI();
                document.getElementById('menu').classList.add('hidden');
                document.getElementById('lobby').classList.remove('hidden');
            } else if(data.type === 'start') {
                gameState = data.state;
                document.getElementById('lobby').classList.add('hidden');
                document.getElementById('hud').style.display = 'block';
            } else if(data.type === 'sync') {
                gameState.tanks = data.tanks;
                gameState.bullets = data.bullets;
                gameState.particles = data.particles;
                gameState.scores = data.scores;
                if(data.shake > camera.shake) camera.shake = data.shake;
                updateHUD();
            }
        });
    });
};

document.getElementById('btnCopyId').onclick = () => {
    const id = document.getElementById('displayHostId').innerText;
    navigator.clipboard.writeText(id);
    document.getElementById('btnCopyId').innerText = "KOPIOITU!";
    setTimeout(() => { document.getElementById('btnCopyId').innerText = "KOPIOI"; }, 2000);
};

function addPlayer(id, name, idx) {
    gameState.tanks[id] = {
        id, name, color: TANK_COLORS[idx % 4],
        x: 0, y: 0, angle: 0, turretAngle: 0,
        hp: 100, lastShot: 0, vx: 0, vy: 0,
        input: { ...localInput }
    };
    gameState.scores[id] = 0;
}

function broadcast(data) {
    Object.values(connections).forEach(c => c.open && c.send(data));
}

document.getElementById('btnStartGame').onclick = () => {
    if(!isHost) return;
    startRound();
    gameState.status = 'playing';
    broadcast({ type: 'start', state: gameState });
    document.getElementById('lobby').classList.add('hidden');
    document.getElementById('hud').style.display = 'block';
};

/** * PELILOGIIKKA */
function generateMap(seed) {
    const prng = mulberry32(hashString(seed));
    gameState.obstacles = [
        {x: -100, y: -100, w: WORLD_SIZE+200, h: 100},
        {x: -100, y: WORLD_SIZE, w: WORLD_SIZE+200, h: 100},
        {x: -100, y: 0, w: 100, h: WORLD_SIZE},
        {x: WORLD_SIZE, y: 0, w: 100, h: WORLD_SIZE}
    ];
    for(let i=0; i<60; i++) {
        let w = 40 + prng() * 150;
        let h = 40 + prng() * 150;
        gameState.obstacles.push({ x: prng() * (WORLD_SIZE-w), y: prng() * (WORLD_SIZE-h), w, h });
    }
}

function startRound() {
    const points = [{x:200,y:200}, {x:WORLD_SIZE-200,y:WORLD_SIZE-200}, {x:WORLD_SIZE-200,y:200}, {x:200,y:WORLD_SIZE-200}];
    let i=0;
    Object.values(gameState.tanks).forEach(t => {
        t.x = points[i % points.length].x; t.y = points[i % points.length].y; t.hp = 100; t.vx = 0; t.vy = 0;
        i++;
    });
    gameState.bullets = []; gameState.particles = []; gameState.roundActive = true;
}

// HUD KORJAUS: Aseen nimi päivittyy nyt inputin perusteella
function updateHUD() {
    const me = gameState.tanks[localPlayerId];
    if(!me) return;
    
    // Luetaan nimi suoraan paikallisesta inputista (valittu ase)
    const currentWeaponIdx = (localInput.weapon - 1);
    const w = WEAPONS[currentWeaponIdx] || WEAPONS[0];
    document.getElementById('weaponDisplay').innerText = w.name;
    
    const progress = Math.min(1, (performance.now() - me.lastShot) / w.reload);
    document.getElementById('reload-circle').style.strokeDashoffset = 201 - (progress * 201);
    document.getElementById('reload-text').innerText = progress < 1 ? "RELOADING..." : "READY";
    document.getElementById('reload-text').style.color = progress < 1 ? "#e74c3c" : "#2ecc71";
    
    const scores = Object.values(gameState.tanks).map(t => `${t.name}: ${gameState.scores[t.id] || 0}`).join(' | ');
    document.getElementById('scoreBoard').innerText = scores;
}

function hostUpdate() {
    if(!gameState.roundActive) return;
    let s = 0;
    let alivePlayers = [];

    Object.values(gameState.tanks).forEach(t => {
        if(t.hp > 0) {
            alivePlayers.push(t.id);
            if(t.input.a) t.angle -= 0.02;
            if(t.input.d) t.angle += 0.02;
            const speed = t.input.w ? 1.5 : (t.input.s ? -0.8 : 0);
            t.vx = Math.cos(t.angle) * speed;
            t.vy = Math.sin(t.angle) * speed;
            t.x += t.vx; t.y += t.vy;
            
            gameState.obstacles.forEach(o => {
                if(t.x+20 > o.x && t.x-20 < o.x+o.w && t.y+20 > o.y && t.y-20 < o.y+o.h) {
                    t.x -= t.vx; t.y -= t.vy;
                }
            });

            t.turretAngle = t.input.turretAngle;
            const w = WEAPONS[t.input.weapon-1] || WEAPONS[0];
            if(t.input.shoot && performance.now() - t.lastShot > w.reload) {
                t.lastShot = performance.now();
                gameState.bullets.push({
                    x: t.x + Math.cos(t.turretAngle)*35, y: t.y + Math.sin(t.turretAngle)*35,
                    vx: Math.cos(t.turretAngle)*w.speed, vy: Math.sin(t.turretAngle)*w.speed,
                    owner: t.id, w: w, life: 120
                });
                s = w.shake;
            }
        }
    });

    // ERÄN LOPPUMISEN KORJAUS: Jos vain yksi pelaaja (tai nolla) on elossa
    if (Object.keys(gameState.tanks).length > 1 && alivePlayers.length <= 1) {
        gameState.roundActive = false;
        if (alivePlayers.length === 1) {
            gameState.scores[alivePlayers[0]]++;
        }
        setTimeout(() => {
            if (gameState.status === 'playing') startRound();
        }, 2000);
    }

    for(let i=gameState.bullets.length-1; i>=0; i--) {
        let b = gameState.bullets[i]; b.x += b.vx; b.y += b.vy; b.life--;
        let hit = false;
        gameState.obstacles.forEach(o => { if(b.x > o.x && b.x < o.x+o.w && b.y > o.y && b.y < o.y+o.h) hit = true; });
        Object.values(gameState.tanks).forEach(t => {
            if(t.hp > 0 && t.id !== b.owner && Math.hypot(t.x-b.x, t.y-b.y) < 25) { 
                t.hp -= b.w.damage; 
                hit = true; 
            }
        });
        if(hit || b.life <= 0) gameState.bullets.splice(i, 1);
    }
    broadcast({ type: 'sync', tanks: gameState.tanks, bullets: gameState.bullets, scores: gameState.scores, shake: s });
}

/** * PIIRTÄMINEN */
function drawTank(t) {
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.fillStyle = "white"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center";
    ctx.fillText(t.name, 0, -40);
    ctx.fillStyle = "#333"; ctx.fillRect(-25, -35, 50, 6);
    ctx.fillStyle = "#2ecc71"; ctx.fillRect(-25, -35, 50 * (Math.max(0, t.hp)/100), 6);
    ctx.rotate(t.angle);
    ctx.fillStyle = "#222"; ctx.fillRect(-22, -18, 44, 36); 
    ctx.fillStyle = t.color; ctx.fillRect(-18, -15, 36, 30); 
    ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(10, -15, 8, 30); 
    ctx.restore();
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.rotate(t.turretAngle);
    ctx.fillStyle = "#555"; ctx.fillRect(0, -4, 35, 8); 
    ctx.strokeStyle = "#333"; ctx.strokeRect(0, -4, 35, 8);
    ctx.fillStyle = t.color;
    ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI*2); ctx.fill();
    ctx.stroke();
    ctx.restore();
}

function render() {
    ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0,0,cw,ch);
    if(gameState.status !== 'playing') return;

    const me = gameState.tanks[localPlayerId];
    if(me) {
        let worldMx = camera.x + (localInput.mx - cw/2);
        let worldMy = camera.y + (localInput.my - ch/2);
        localInput.turretAngle = Math.atan2(worldMy - me.y, worldMx - me.x);
        camera.x += (me.x - camera.x) * 0.1;
        camera.y += (me.y - camera.y) * 0.1;
        if(!isHost) hostConn.send({ type: 'input', input: localInput });
        else me.input = { ...localInput };
    }

    ctx.save();
    ctx.translate(cw/2 - camera.x + (Math.random()-0.5)*camera.shake, ch/2 - camera.y + (Math.random()-0.5)*camera.shake);
    camera.shake *= 0.9;
    ctx.strokeStyle = "#222";
    for(let x=0; x<WORLD_SIZE; x+=100) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,WORLD_SIZE); ctx.stroke(); }
    for(let y=0; y<WORLD_SIZE; y+=100) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(WORLD_SIZE,y); ctx.stroke(); }
    gameState.obstacles.forEach(o => {
        ctx.fillStyle = "#333"; ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.strokeStyle = "#444"; ctx.lineWidth = 4; ctx.strokeRect(o.x, o.y, o.w, o.h);
    });
    gameState.bullets.forEach(b => {
        ctx.fillStyle = "#f1c40f"; ctx.beginPath(); ctx.arc(b.x, b.y, b.w.radius, 0, Math.PI*2); ctx.fill();
    });
    Object.values(gameState.tanks).forEach(t => { if(t.hp > 0) drawTank(t); });
    ctx.restore();
    
    mctx.fillStyle = "black"; mctx.fillRect(0,0,180,180);
    const s = 180/WORLD_SIZE;
    ctx.fillStyle = "#555"; gameState.obstacles.forEach(o => mctx.fillRect(o.x*s, o.y*s, o.w*s, o.h*s));
    Object.values(gameState.tanks).forEach(t => { if(t.hp>0) { mctx.fillStyle=t.color; mctx.fillRect(t.x*s-2, t.y*s-2, 4, 4); } });
}

function updateLobbyUI() {
    const list = document.getElementById('playerList');
    list.innerHTML = '';
    Object.values(gameState.tanks).forEach(t => {
        list.innerHTML += `<div style="padding:8px; background:#333; margin:4px; border-radius:4px; color:${t.color}; font-weight:bold;">${t.name}</div>`;
    });
}

function loop() {
    if(isHost) hostUpdate();
    render();
    if(gameState.status === 'playing') updateHUD(); // Varmistetaan HUD päivitys loopissa
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

window.onkeydown = (e) => {
    const k = e.key.toLowerCase();
    if(k === 'w') localInput.w = true; if(k === 's') localInput.s = true;
    if(k === 'a') localInput.a = true; if(k === 'd') localInput.d = true;
    if(k >= '1' && k <= '4') localInput.weapon = parseInt(k);
};
window.onkeyup = (e) => {
    const k = e.key.toLowerCase();
    if(k === 'w') localInput.w = false; if(k === 's') localInput.s = false;
    if(k === 'a') localInput.a = false; if(k === 'd') localInput.d = false;
};
window.onmousemove = (e) => { localInput.mx = e.clientX; localInput.my = e.clientY; };
window.onmousedown = () => { localInput.shoot = true; };
window.onmouseup = () => { localInput.shoot = false; };
</script>
</body>
</html>
