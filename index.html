<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Top-Down Tank Combat</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: #fff; font-family: monospace; user-select: none; }
        canvas { display: block; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .panel { background: rgba(0, 0, 0, 0.85); padding: 20px; border: 2px solid #444; border-radius: 8px; box-shadow: 0 0 15px #000; }
        
        #menu, #lobby, #match-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; gap: 10px; min-width: 300px; }
        input, select, button { padding: 8px; font-family: monospace; font-size: 16px; background: #222; color: #fff; border: 1px solid #555; }
        button { cursor: pointer; background: #444; font-weight: bold; }
        button:hover { background: #666; }
        
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; display: none; }
        .hud-top { display: flex; justify-content: center; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 0 #000; }
        
        /* HP palkki vasemmalla */
        .hud-left { position: absolute; bottom: 20px; left: 20px; }
        #hp-bar-bg { width: 200px; height: 12px; background: #222; border: 1px solid #444; }
        #hp-bar-fill { width: 100%; height: 100%; background: #2ecc71; transition: width 0.2s; }

        /* KESKITETTY ASENÄYTTÖ JA LATAUSYMPYRÄ */
        .hud-center { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            text-align: center;
        }
        .weapon-label { font-size: 26px; font-weight: bold; color: #ff4444; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,0,0,0.5); }
        .reload-status { font-size: 14px; color: #aaa; height: 1.2em; font-weight: bold; }
        
        /* Latausympyrän tyyli */
        .loader-container { position: relative; width: 60px; height: 60px; }
        .loader-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .loader-bg { fill: none; stroke: #222; stroke-width: 6; }
        .loader-fill { fill: none; stroke: #0f0; stroke-width: 6; stroke-dasharray: 170; stroke-dashoffset: 170; transition: stroke-dashoffset 0.1s linear, stroke 0.3s; }

        #minimap-container { position: absolute; bottom: 20px; right: 20px; width: 150px; height: 150px; border: 2px solid #555; background: rgba(0,0,0,0.5); }
        #minimap { width: 100%; height: 100%; }
        
        .hidden { display: none !important; }
        .player-row { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 5px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer">
        <div id="menu" class="panel interactive">
            <h1>TANK COMBAT</h1>
            <label>Player Name:</label>
            <input type="text" id="playerName" value="Player">
            <label>Map Seed:</label>
            <input type="text" id="mapSeed" value="secret_seed_123">
            <hr style="width:100%; border-color:#444;">
            <h3>Host Game</h3>
            <label>Match Mode:</label>
            <select id="matchMode">
                <option value="3">Best of 3</option>
                <option value="5">Best of 5</option>
                <option value="10">Best of 10</option>
            </select>
            <button id="btnHost">Create & Host Game</button>
            <hr style="width:100%; border-color:#444;">
            <h3>Join Game</h3>
            <label>Host ID:</label>
            <input type="text" id="hostIdInput" placeholder="Paste Host ID here">
            <button id="btnJoin">Join Game</button>
            <p id="menuStatus" style="color: yellow; text-align: center;"></p>
        </div>

        <div id="lobby" class="panel interactive hidden">
            <h2>LOBBY (Host)</h2>
            <p>Your Host ID (Share this): <br><strong id="displayHostId" style="color: #0f0; user-select: all;"></strong></p>
            <div id="playerList"></div>
            <button id="btnStartGame" style="margin-top:15px; background:#28a745;">Start Match</button>
        </div>

        <div id="hud">
            <div class="hud-top" id="scoreBoard">P1: 0 | P2: 0</div>
            
            <div class="hud-left">
                <div style="font-size: 12px; margin-bottom: 5px;">HULL INTEGRITY</div>
                <div id="hp-bar-bg"><div id="hp-bar-fill"></div></div>
            </div>

            <div class="hud-center">
                <div id="weaponDisplay" class="weapon-label">20mm CANNON</div>
                <div class="loader-container">
                    <svg class="loader-svg">
                        <circle class="loader-bg" cx="30" cy="30" r="27"></circle>
                        <circle id="reload-circle" class="loader-fill" cx="30" cy="30" r="27"></circle>
                    </svg>
                </div>
                <div id="reload-text" class="reload-status">READY</div>
            </div>

            <div id="minimap-container">
                <canvas id="minimap"></canvas>
            </div>
        </div>

        <div id="match-over" class="panel interactive hidden">
            <h1 id="winnerText">PLAYER WINS!</h1>
            <button id="btnBackToMenu">Back to Menu</button>
        </div>
    </div>

<script>
/** * AUDIO SYSTEM */
const AudioEngine = {
    ctx: null,
    engineOsc: null,
    engineGain: null,
    init() {
        if(this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.engineOsc = this.ctx.createOscillator();
        this.engineGain = this.ctx.createGain();
        this.engineOsc.type = 'sawtooth';
        this.engineOsc.frequency.setValueAtTime(30, this.ctx.currentTime);
        this.engineGain.gain.setValueAtTime(0, this.ctx.currentTime);
        const lpf = this.ctx.createBiquadFilter();
        lpf.type = 'lowpass'; lpf.frequency.value = 150;
        this.engineOsc.connect(lpf).connect(this.engineGain).connect(this.ctx.destination);
        this.engineOsc.start();
    },
    updateEngine(speed) {
        if(!this.ctx) return;
        const freq = 30 + (speed * 15);
        const vol = 0.01 + (speed * 0.04);
        this.engineOsc.frequency.setTargetAtTime(freq, this.ctx.currentTime, 0.1);
        this.engineGain.gain.setTargetAtTime(vol, this.ctx.currentTime, 0.1);
    },
    playShot(weaponId) {
        if(!this.ctx) return;
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        o.connect(g).connect(this.ctx.destination);
        if(weaponId === 1) { // MACHINE GUN
            o.frequency.setValueAtTime(120, this.ctx.currentTime);
            g.gain.setValueAtTime(0.1, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
            o.start(); o.stop(this.ctx.currentTime + 0.1);
        } else { // CANNONS
            o.frequency.setValueAtTime(80 - (weaponId*10), this.ctx.currentTime);
            g.gain.setValueAtTime(0.4, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.4);
            o.start(); o.stop(this.ctx.currentTime + 0.4);
        }
    }
};

/** * GLOBALS & CONFIG */
const WORLD_SIZE = 2000;
const TANK_COLORS = ['#ff4444', '#4444ff', '#44ff44', '#ffff44'];
const WEAPONS = [
    { id: 1, name: "MACHINE GUN", damage: 5, speed: 25, reload: 100, recoil: 2, radius: 3, shake: 0, splash: 0 },
    { id: 2, name: "20mm CANNON", damage: 20, speed: 18, reload: 500, recoil: 5, radius: 5, shake: 2, splash: 30 },
    { id: 3, name: "50mm CANNON", damage: 50, speed: 14, reload: 1500, recoil: 12, radius: 8, shake: 8, splash: 80 },
    { id: 4, name: "150mm GIANT", damage: 100, speed: 10, reload: 3500, recoil: 30, radius: 12, shake: 20, splash: 200 }
];

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const minimap = document.getElementById('minimap');
const mctx = minimap.getContext('2d');
let cw = canvas.width = window.innerWidth;
let ch = canvas.height = window.innerHeight;
minimap.width = 150; minimap.height = 150;

window.addEventListener('resize', () => {
    cw = canvas.width = window.innerWidth;
    ch = canvas.height = window.innerHeight;
});

function mulberry32(a) {
    return function() {
      var t = a += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }
}
function hashString(str) {
    let h = 1779033703 ^ str.length;
    for(let i = 0; i < str.length; i++) {
        h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
        h = h << 13 | h >>> 19;
    }
    return h;
}

let gameState = { status: 'menu', tanks: {}, bullets: [], particles: [], obstacles: [], scores: {}, boLimit: 3, winner: null, roundActive: false };
let localInput = { w: false, a: false, s: false, d: false, mx: 0, my: 0, shoot: false, weapon: 1 };
let localPlayerId = null;
let camera = { x: WORLD_SIZE/2, y: WORLD_SIZE/2, shake: 0 };
let lastTime = performance.now();
let peer = null, isHost = false, connections = {}, hostConn = null;

const UI = { menu: document.getElementById('menu'), lobby: document.getElementById('lobby'), hud: document.getElementById('hud'), matchOver: document.getElementById('match-over'), status: document.getElementById('menuStatus') };

function showUI(elementId) {
    Object.values(UI).forEach(el => el.classList.add('hidden'));
    if(UI[elementId]) UI[elementId].classList.remove('hidden');
}

window.addEventListener('keydown', (e) => {
    AudioEngine.init();
    if(e.key.toLowerCase() === 'w') localInput.w = true;
    if(e.key.toLowerCase() === 's') localInput.s = true;
    if(e.key.toLowerCase() === 'a') localInput.a = true;
    if(e.key.toLowerCase() === 'd') localInput.d = true;
    if(e.key >= '1' && e.key <= '4') localInput.weapon = parseInt(e.key);
});
window.addEventListener('keyup', (e) => {
    if(e.key.toLowerCase() === 'w') localInput.w = false;
    if(e.key.toLowerCase() === 's') localInput.s = false;
    if(e.key.toLowerCase() === 'a') localInput.a = false;
    if(e.key.toLowerCase() === 'd') localInput.d = false;
});
window.addEventListener('mousemove', (e) => { localInput.mx = e.clientX; localInput.my = e.clientY; });
window.addEventListener('mousedown', (e) => { if(e.button === 0) localInput.shoot = true; AudioEngine.init(); });
window.addEventListener('mouseup', (e) => { if(e.button === 0) localInput.shoot = false; });

function initPeer(callback) {
    UI.status.innerText = "Connecting to network...";
    peer = new Peer();
    peer.on('open', (id) => { localPlayerId = id; UI.status.innerText = "Connected to signaling server."; if(callback) callback(); });
    peer.on('error', (err) => { UI.status.innerText = "Network Error: " + err.type; });
}

document.getElementById('btnHost').addEventListener('click', () => {
    initPeer(() => {
        isHost = true;
        gameState.boLimit = parseInt(document.getElementById('matchMode').value);
        generateMap(document.getElementById('mapSeed').value);
        addPlayerToGame(localPlayerId, document.getElementById('playerName').value, 0);
        document.getElementById('displayHostId').innerText = localPlayerId;
        updateLobbyUI();
        showUI('lobby');
        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.type === 'join') {
                    if(Object.keys(gameState.tanks).length >= 4 || gameState.status !== 'lobby') { conn.send({ type: 'reject', reason: 'Game full or started' }); return; }
                    connections[conn.peer] = conn;
                    addPlayerToGame(conn.peer, data.name, Object.keys(gameState.tanks).length);
                    updateLobbyUI();
                    broadcast({ type: 'lobbyUpdate', tanks: gameState.tanks });
                } else if (data.type === 'input') { if(gameState.tanks[conn.peer]) gameState.tanks[conn.peer].input = data.input; }
                if(data.type === 'playShot') AudioEngine.playShot(data.weaponId);
            });
            conn.on('close', () => { delete connections[conn.peer]; delete gameState.tanks[conn.peer]; delete gameState.scores[conn.peer]; updateLobbyUI(); });
        });
    });
});

function addPlayerToGame(id, name, index) {
    gameState.tanks[id] = { id: id, name: name, color: TANK_COLORS[index % 4], x: 0, y: 0, angle: 0, turretAngle: 0, hp: 100, maxHp: 100, input: { w:false, a:false, s:false, d:false, mx:cw/2, my:ch/2, shoot:false, weapon:1 }, lastShot: 0, vx: 0, vy: 0 };
    gameState.scores[id] = 0;
}

function broadcast(data) { Object.values(connections).forEach(conn => { if(conn.open) conn.send(data); }); }

document.getElementById('btnStartGame').addEventListener('click', () => { if(!isHost) return; startRound(); gameState.status = 'playing'; broadcast({ type: 'start', state: gameState }); showUI('hud'); });

function updateLobbyUI() {
    const list = document.getElementById('playerList'); list.innerHTML = '';
    Object.values(gameState.tanks).forEach(t => {
        let row = document.createElement('div'); row.className = 'player-row';
        row.innerHTML = `<span>${t.name} ${t.id === localPlayerId ? '(You)' : ''}</span>`;
        if(t.id !== localPlayerId) {
            let btn = document.createElement('button'); btn.innerText = 'KICK';
            btn.onclick = () => { connections[t.id].send({ type: 'kicked' }); connections[t.id].close(); delete connections[t.id]; delete gameState.tanks[t.id]; delete gameState.scores[t.id]; updateLobbyUI(); };
            row.appendChild(btn);
        }
        list.appendChild(row);
    });
}

document.getElementById('btnJoin').addEventListener('click', () => {
    const hostId = document.getElementById('hostIdInput').value.trim();
    if(!hostId) return;
    initPeer(() => {
        isHost = false;
        hostConn = peer.connect(hostId);
        hostConn.on('open', () => { hostConn.send({ type: 'join', name: document.getElementById('playerName').value }); UI.status.innerText = "Waiting for host..."; });
        hostConn.on('data', (data) => {
            if(data.type === 'reject') { UI.status.innerText = "Rejected: " + data.reason; hostConn.close(); }
            else if(data.type === 'lobbyUpdate') { UI.status.innerText = "In Lobby. Waiting for host to start..."; }
            else if(data.type === 'start') { gameState = data.state; showUI('hud'); }
            else if(data.type === 'sync') { 
                gameState.tanks = data.tanks; gameState.bullets = data.bullets; gameState.particles = data.particles; gameState.scores = data.scores; gameState.boLimit = data.boLimit;
                if(data.shake > camera.shake) camera.shake = data.shake;
                updateHUD();
            } else if(data.type === 'playShot') { AudioEngine.playShot(data.weaponId); }
            else if(data.type === 'matchOver') { document.getElementById('winnerText').innerText = `${data.winnerName} WINS THE MATCH!`; showUI('match-over'); gameState.status = 'gameover'; }
            else if(data.type === 'kicked') { alert("You were kicked by the host."); location.reload(); }
        });
    });
});

function generateMap(seedStr) {
    const prng = mulberry32(hashString(seedStr));
    gameState.obstacles = [];
    gameState.obstacles.push({x: -500, y: -500, w: WORLD_SIZE+1000, h: 500});
    gameState.obstacles.push({x: -500, y: WORLD_SIZE, w: WORLD_SIZE+1000, h: 500});
    gameState.obstacles.push({x: -500, y: 0, w: 500, h: WORLD_SIZE});
    gameState.obstacles.push({x: WORLD_SIZE, y: 0, w: 500, h: WORLD_SIZE});
    for(let i=0; i<150; i++) {
        let w = 25 + prng() * 100; let h = 25 + prng() * 100;
        let x = prng() * (WORLD_SIZE - w); let y = prng() * (WORLD_SIZE - h);
        gameState.obstacles.push({x, y, w, h});
    }
}

function spawnParticles(x, y, count, color, speed, sizeMultiplier=1) {
    for(let i=0; i<count; i++) {
        let angle = Math.random() * Math.PI * 2; let v = Math.random() * speed;
        gameState.particles.push({ x, y, vx: Math.cos(angle)*v, vy: Math.sin(angle)*v, life: 1.0, color, size: (2 + Math.random()*3)*sizeMultiplier });
    }
}

function rectIntersect(r1, r2) { return !(r2.x >= r1.x + r1.w || r2.x + r2.w <= r1.x || r2.y >= r1.y + r1.h || r2.y + r2.h <= r1.y); }

function resolveCollision(tank, rect) {
    let tw = 36, th = 36;
    let tx = tank.x - tw/2, ty = tank.y - th/2;
    if(rectIntersect({x:tx, y:ty, w:tw, h:th}, rect)) {
        let dx1 = (tx + tw) - rect.x; let dx2 = (rect.x + rect.w) - tx;
        let dy1 = (ty + th) - rect.y; let dy2 = (rect.y + rect.h) - ty;
        let min = Math.min(dx1, dx2, dy1, dy2);
        if(min === dx1) tank.x -= dx1; else if(min === dx2) tank.x += dx2;
        else if(min === dy1) tank.y -= dy1; else if(min === dy2) tank.y += dy2;
        return true;
    }
    return false;
}

function startRound() {
    let i = 0; const spawnPoints = [{x: 200, y: 200}, {x: WORLD_SIZE-200, y: WORLD_SIZE-200}, {x: WORLD_SIZE-200, y: 200}, {x: 200, y: WORLD_SIZE-200}];
    Object.values(gameState.tanks).forEach(t => { t.hp = 100; t.x = spawnPoints[i].x; t.y = spawnPoints[i].y; t.vx = 0; t.vy = 0; i++; });
    gameState.bullets = []; gameState.particles = []; gameState.roundActive = true;
}

function hostUpdate(dt) {
    if(!gameState.roundActive) return;
    let localShake = 0;
    Object.values(gameState.tanks).forEach(t => {
        if(t.hp <= 0) return;
        const rotSpeed = 0.05;
        if(t.input.a) t.angle -= rotSpeed; if(t.input.d) t.angle += rotSpeed;
        const accel = 0.5; const friction = 0.85;
        if(t.input.w) { t.vx += Math.cos(t.angle) * accel; t.vy += Math.sin(t.angle) * accel; }
        if(t.input.s) { t.vx -= Math.cos(t.angle) * accel; t.vy -= Math.sin(t.angle) * accel; }
        t.vx *= friction; t.vy *= friction;
        t.x += t.vx; t.y += t.vy;
        t.turretAngle = t.input.turretAngle || t.angle;
        gameState.obstacles.forEach(obs => resolveCollision(t, obs));
        let weapon = WEAPONS[t.input.weapon - 1] || WEAPONS[0];
        let time = performance.now();
        if(t.input.shoot && time - t.lastShot > weapon.reload) {
            t.lastShot = time; t.vx -= Math.cos(t.turretAngle) * weapon.recoil; t.vy -= Math.sin(t.turretAngle) * weapon.recoil;
            if(weapon.shake > localShake) localShake = weapon.shake;
            let bx = t.x + Math.cos(t.turretAngle) * 30; let by = t.y + Math.sin(t.turretAngle) * 30;
            gameState.bullets.push({ x: bx, y: by, vx: Math.cos(t.turretAngle) * weapon.speed, vy: Math.sin(t.turretAngle) * weapon.speed, owner: t.id, weapon, life: 150 });
            spawnParticles(bx, by, 5, '#ffaa00', 3);
            broadcast({type: 'playShot', weaponId: weapon.id});
            AudioEngine.playShot(weapon.id);
        }
    });
    for(let i = gameState.bullets.length - 1; i >= 0; i--) {
        let b = gameState.bullets[i]; b.x += b.vx; b.y += b.vy; b.life--;
        let hit = false;
        for(let obs of gameState.obstacles) { if(b.x > obs.x && b.x < obs.x+obs.w && b.y > obs.y && b.y < obs.y+obs.h) { hit = true; break; } }
        if(!hit) {
            for(let key in gameState.tanks) {
                let t = gameState.tanks[key];
                if(t.hp > 0 && t.id !== b.owner && Math.hypot(t.x - b.x, t.y - b.y) < 25) {
                    hit = true; t.hp -= b.weapon.damage; if(b.weapon.splash > 0) localShake += b.weapon.shake; break;
                }
            }
        }
        if(hit || b.life <= 0) {
            spawnParticles(b.x, b.y, b.weapon.splash > 0 ? 30 : 10, '#ff5500', b.weapon.splash > 0 ? 8 : 4, b.weapon.splash > 0 ? 2 : 1);
            if(b.weapon.splash > 0) { Object.values(gameState.tanks).forEach(t => { if(t.hp > 0) { let dist = Math.hypot(t.x - b.x, t.y - b.y); if(dist < b.weapon.splash) t.hp -= b.weapon.damage * (1 - dist/b.weapon.splash); } }); }
            gameState.bullets.splice(i, 1);
        }
    }
    let aliveTanks = Object.values(gameState.tanks).filter(t => t.hp > 0);
    if(aliveTanks.length <= 1 && Object.keys(gameState.tanks).length > 1) {
        gameState.roundActive = false;
        if(aliveTanks.length === 1) {
            let winnerId = aliveTanks[0].id; gameState.scores[winnerId]++;
            if(gameState.scores[winnerId] >= gameState.boLimit) { broadcast({ type: 'matchOver', winnerName: aliveTanks[0].name }); showUI('match-over'); gameState.status = 'gameover'; return; }
        }
        setTimeout(() => { if(gameState.status === 'playing') startRound(); }, 3000);
    }
    for(let i = gameState.particles.length - 1; i >= 0; i--) { let p = gameState.particles[i]; p.x += p.vx; p.y += p.vy; p.vx *= 0.9; p.vy *= 0.9; p.life -= 0.05; if(p.life <= 0) gameState.particles.splice(i, 1); }
    broadcast({ type: 'sync', tanks: gameState.tanks, bullets: gameState.bullets, particles: gameState.particles, scores: gameState.scores, boLimit: gameState.boLimit, shake: localShake });
}

function updateHUD() {
    let myTank = gameState.tanks[localPlayerId];
    if(!myTank) return;
    
    // HP Palkki
    document.getElementById('hp-bar-fill').style.width = Math.max(0, myTank.hp) + '%';
    
    // Aseen tiedot
    let w = WEAPONS[localInput.weapon - 1] || WEAPONS[0];
    document.getElementById('weaponDisplay').innerText = w.name;
    
    // Latauslogiikka
    let timeSinceShot = performance.now() - myTank.lastShot;
    let progress = Math.min(1, timeSinceShot / w.reload);
    
    // Latausympyrä (SVG dashoffset: 170 on tyhjä, 0 on täynnä)
    let circle = document.getElementById('reload-circle');
    let offset = 170 - (progress * 170);
    circle.style.strokeDashoffset = offset;
    
    // Teksti ja väri
    if(progress < 1) {
        document.getElementById('reload-text').innerText = "RELOADING...";
        document.getElementById('reload-text').style.color = "#ff4444";
        circle.style.stroke = "#ff4444";
    } else {
        document.getElementById('reload-text').innerText = "READY";
        document.getElementById('reload-text').style.color = "#00ff00";
        circle.style.stroke = "#00ff00";
    }

    let scoreText = Object.values(gameState.tanks).map(t => `${t.name}: ${gameState.scores[t.id]||0}`).join(' | ');
    document.getElementById('scoreBoard').innerText = scoreText + ` (BO${gameState.boLimit})`;
}

function drawMinimap() {
    mctx.clearRect(0, 0, minimap.width, minimap.height); const scale = minimap.width / WORLD_SIZE;
    mctx.fillStyle = '#444'; gameState.obstacles.forEach(o => mctx.fillRect(o.x * scale, o.y * scale, o.w * scale, o.h * scale));
    Object.values(gameState.tanks).forEach(t => { if(t.hp > 0) { mctx.fillStyle = t.color; mctx.beginPath(); mctx.arc(t.x * scale, t.y * scale, 3, 0, Math.PI*2); mctx.fill(); }});
}

function render() {
    ctx.fillStyle = '#111'; ctx.fillRect(0, 0, cw, ch);
    if(gameState.status !== 'playing') return;
    let myTank = gameState.tanks[localPlayerId];
    if(myTank) {
        let worldMouseX = camera.x + (localInput.mx - cw/2); let worldMouseY = camera.y + (localInput.my - ch/2);
        localInput.turretAngle = Math.atan2(worldMouseY - myTank.y, worldMouseX - myTank.x);
        if(isHost) myTank.input = { ...localInput, turretAngle: localInput.turretAngle };
        else if(hostConn && hostConn.open) hostConn.send({ type: 'input', input: { ...localInput, turretAngle: localInput.turretAngle } });
        camera.x += (myTank.x + (worldMouseX - myTank.x) * 0.33 - camera.x) * 0.1;
        camera.y += (myTank.y + (worldMouseY - myTank.y) * 0.33 - camera.y) * 0.1;
        AudioEngine.updateEngine(Math.hypot(myTank.vx, myTank.vy));
    }
    let sx = (Math.random()-0.5) * camera.shake; let sy = (Math.random()-0.5) * camera.shake;
    camera.shake *= 0.9;
    ctx.save(); ctx.translate(cw/2 - camera.x + sx, ch/2 - camera.y + sy);
    ctx.strokeStyle = '#222'; ctx.lineWidth = 2; ctx.beginPath();
    for(let x = Math.floor((camera.x-cw/2)/100)*100; x < camera.x+cw/2; x+=100) { ctx.moveTo(x, camera.y-ch/2); ctx.lineTo(x, camera.y+ch/2); }
    for(let y = Math.floor((camera.y-ch/2)/100)*100; y < camera.y+ch/2; y+=100) { ctx.moveTo(camera.x-cw/2, y); ctx.lineTo(camera.x+cw/2, y); }
    ctx.stroke();
    ctx.strokeStyle = '#f00'; ctx.lineWidth = 5; ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);
    ctx.fillStyle = '#333'; ctx.strokeStyle = '#555';
    gameState.obstacles.forEach(o => { ctx.fillRect(o.x, o.y, o.w, o.h); ctx.strokeRect(o.x, o.y, o.w, o.h); });
    gameState.particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
    ctx.globalAlpha = 1.0;
    gameState.bullets.forEach(b => { ctx.fillStyle = '#ffaa00'; ctx.beginPath(); ctx.arc(b.x, b.y, b.weapon.radius, 0, Math.PI*2); ctx.fill(); });
    Object.values(gameState.tanks).forEach(t => {
        if(t.hp <= 0) return;
        ctx.save(); ctx.translate(t.x, t.y);
        ctx.fillStyle = '#fff'; ctx.font = '12px monospace'; ctx.textAlign = 'center'; ctx.fillText(t.name, 0, -35);
        ctx.rotate(t.angle); ctx.fillStyle = t.color; ctx.fillRect(-20, -15, 40, 30);
        ctx.fillStyle = '#222'; ctx.fillRect(10, -10, 10, 20); ctx.restore();
        ctx.save(); ctx.translate(t.x, t.y); ctx.rotate(t.turretAngle);
        ctx.fillStyle = '#555'; ctx.fillRect(0, -5, 35, 10); ctx.fillStyle = '#777';
        ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill(); ctx.restore();
    });
    ctx.restore();
    if(!isHost) updateHUD();
    drawMinimap();
}

function gameLoop() {
    let now = performance.now(); let dt = now - lastTime; lastTime = now;
    if(isHost) hostUpdate(dt); render(); requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
document.getElementById('btnBackToMenu').addEventListener('click', () => { location.reload(); });
</script>
