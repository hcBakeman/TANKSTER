<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Top-Down Tank Combat - Rekyyli Päivitys</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: #fff; font-family: monospace; user-select: none; }
        canvas { display: block; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .panel { background: rgba(0, 0, 0, 0.85); padding: 20px; border: 2px solid #444; border-radius: 8px; box-shadow: 0 0 15px #000; }
        
        #menu, #lobby, #match-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; gap: 10px; min-width: 300px; }
        input, select, button { padding: 8px; font-family: monospace; font-size: 16px; background: #222; color: #fff; border: 1px solid #555; }
        button { cursor: pointer; background: #444; font-weight: bold; }
        button:hover { background: #666; }
        
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; display: none; }
        .hud-top { display: flex; justify-content: center; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 0 #000; }
        .hud-bottom { position: absolute; bottom: 20px; left: 20px; }
        .weapon-info { font-size: 18px; text-shadow: 1px 1px 0 #000; }
        
        #minimap-container { position: absolute; bottom: 20px; right: 20px; width: 150px; height: 150px; border: 2px solid #555; background: rgba(0,0,0,0.5); }
        #minimap { width: 100%; height: 100%; }
        
        .hidden { display: none !important; }
        h1, h2 { margin: 0 0 10px 0; text-align: center; }
        .player-row { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 5px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer">
        
        <div id="menu" class="panel interactive">
            <h1>TANK COMBAT</h1>
            <label>Player Name:</label>
            <input type="text" id="playerName" value="Player">
            <label>Map Seed:</label>
            <input type="text" id="mapSeed" value="secret_seed_123">
            
            <hr style="width:100%; border-color:#444;">
            
            <h3>Host Game</h3>
            <label>Match Mode:</label>
            <select id="matchMode">
                <option value="3">Best of 3</option>
                <option value="5">Best of 5</option>
                <option value="10">Best of 10</option>
            </select>
            <button id="btnHost">Create & Host Game</button>
            
            <hr style="width:100%; border-color:#444;">
            
            <h3>Join Game</h3>
            <label>Host ID:</label>
            <input type="text" id="hostIdInput" placeholder="Paste Host ID here">
            <button id="btnJoin">Join Game</button>
            
            <p id="menuStatus" style="color: yellow; text-align: center;"></p>
        </div>

        <div id="lobby" class="panel interactive hidden">
            <h2>LOBBY (Host)</h2>
            <p>Your Host ID (Share this): <br><strong id="displayHostId" style="color: #0f0; user-select: all;"></strong></p>
            <div id="playerList"></div>
            <button id="btnStartGame" style="margin-top:15px; background:#28a745;">Start Match</button>
        </div>

        <div id="hud">
            <div class="hud-top" id="scoreBoard">P1: 0 | P2: 0</div>
            <div class="hud-bottom">
                <div class="weapon-info" id="hpDisplay" style="color: #0f0;">HP: 100</div>
                <div class="weapon-info" id="weaponDisplay">Weapon: 20mm Cannon</div>
                <div class="weapon-info" id="reloadDisplay">Ready</div>
            </div>
            <div id="minimap-container">
                <canvas id="minimap"></canvas>
            </div>
        </div>

        <div id="match-over" class="panel interactive hidden">
            <h1 id="winnerText">PLAYER WINS!</h1>
            <button id="btnBackToMenu">Back to Menu</button>
        </div>
        
    </div>

<script>
/** * GLOBALS & CONFIG */
const WORLD_SIZE = 2000;
const TANK_COLORS = ['#ff4444', '#4444ff', '#44ff44', '#ffff44'];
const WEAPONS = [
    { id: 1, name: "Machine Gun", damage: 5, speed: 25, reload: 100, recoil: 3, radius: 3, shake: 0, splash: 0 },
    { id: 2, name: "20mm Cannon", damage: 20, speed: 18, reload: 500, recoil: 8, radius: 5, shake: 2, splash: 30 },
    { id: 3, name: "50mm Cannon", damage: 50, speed: 14, reload: 1500, recoil: 20, radius: 8, shake: 8, splash: 80 },
    { id: 4, name: "150mm Giant", damage: 100, speed: 10, reload: 3500, recoil: 50, radius: 12, shake: 20, splash: 200 }
];

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const minimap = document.getElementById('minimap');
const mctx = minimap.getContext('2d');
let cw = canvas.width = window.innerWidth;
let ch = canvas.height = window.innerHeight;
minimap.width = 150; minimap.height = 150;

window.addEventListener('resize', () => {
    cw = canvas.width = window.innerWidth;
    ch = canvas.height = window.innerHeight;
});

function mulberry32(a) {
    return function() {
      var t = a += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }
}
function hashString(str) {
    let h = 1779033703 ^ str.length;
    for(let i = 0; i < str.length; i++) {
        h = Math.imul(h ^ str.charCodeAt(i), 3432918353); h = h << 13 | h >>> 19;
    }
    return h;
}

let gameState = {
    status: 'menu',
    tanks: {},
    bullets: [],
    particles: [],
    obstacles: [],
    scores: {},
    boLimit: 3,
    winner: null,
    roundActive: false
};

let localInput = { w: false, a: false, s: false, d: false, mx: 0, my: 0, shoot: false, weapon: 1 };
let localPlayerId = null;
let camera = { x: WORLD_SIZE/2, y: WORLD_SIZE/2, shake: 0 };
let lastTime = performance.now();
let peer = null;
let isHost = false;
let connections = {};
let hostConn = null;

const UI = {
    menu: document.getElementById('menu'),
    lobby: document.getElementById('lobby'),
    hud: document.getElementById('hud'),
    matchOver: document.getElementById('match-over'),
    status: document.getElementById('menuStatus')
};

function showUI(elementId) {
    Object.values(UI).forEach(el => el.classList.add('hidden'));
    if(UI[elementId]) UI[elementId].classList.remove('hidden');
}

window.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if(k === 'w') localInput.w = true; if(k === 's') localInput.s = true;
    if(k === 'a') localInput.a = true; if(k === 'd') localInput.d = true;
    if(e.key >= '1' && e.key <= '4') localInput.weapon = parseInt(e.key);
});
window.addEventListener('keyup', (e) => {
    const k = e.key.toLowerCase();
    if(k === 'w') localInput.w = false; if(k === 's') localInput.s = false;
    if(k === 'a') localInput.a = false; if(k === 'd') localInput.d = false;
});
window.addEventListener('mousemove', (e) => { localInput.mx = e.clientX; localInput.my = e.clientY; });
window.addEventListener('mousedown', (e) => { if(e.button === 0) localInput.shoot = true; });
window.addEventListener('mouseup', (e) => { if(e.button === 0) localInput.shoot = false; });

function initPeer(callback) {
    UI.status.innerText = "Connecting...";
    peer = new Peer();
    peer.on('open', (id) => { localPlayerId = id; UI.status.innerText = "Connected."; callback(); });
    peer.on('error', (err) => { UI.status.innerText = "Error: " + err.type; });
}

document.getElementById('btnHost').addEventListener('click', () => {
    initPeer(() => {
        isHost = true;
        gameState.boLimit = parseInt(document.getElementById('matchMode').value);
        generateMap(document.getElementById('mapSeed').value);
        addPlayerToGame(localPlayerId, document.getElementById('playerName').value, 0);
        document.getElementById('displayHostId').innerText = localPlayerId;
        updateLobbyUI();
        showUI('lobby');
        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.type === 'join') {
                    connections[conn.peer] = conn;
                    addPlayerToGame(conn.peer, data.name, Object.keys(gameState.tanks).length);
                    updateLobbyUI();
                    broadcast({ type: 'lobbyUpdate', tanks: gameState.tanks });
                } else if (data.type === 'input') {
                    if(gameState.tanks[conn.peer]) gameState.tanks[conn.peer].input = data.input;
                }
            });
            conn.on('close', () => { delete connections[conn.peer]; delete gameState.tanks[conn.peer]; updateLobbyUI(); });
        });
    });
});

function addPlayerToGame(id, name, index) {
    gameState.tanks[id] = {
        id, name, color: TANK_COLORS[index % 4], x: 0, y: 0, angle: 0, turretAngle: 0,
        hp: 100, maxHp: 100, lastShot: 0, vx: 0, vy: 0,
        input: { ...localInput }
    };
    gameState.scores[id] = 0;
}

function broadcast(data) { Object.values(connections).forEach(c => c.open && c.send(data)); }

document.getElementById('btnStartGame').addEventListener('click', () => {
    if(!isHost) return;
    startRound();
    gameState.status = 'playing';
    broadcast({ type: 'start', state: gameState });
    showUI('hud');
});

function updateLobbyUI() {
    const list = document.getElementById('playerList');
    list.innerHTML = '';
    Object.values(gameState.tanks).forEach(t => {
        let row = document.createElement('div');
        row.className = 'player-row';
        row.innerHTML = `<span>${t.name}</span>`;
        if(t.id !== localPlayerId) {
            let btn = document.createElement('button'); btn.innerText = 'KICK';
            btn.onclick = () => { connections[t.id].send({ type: 'kicked' }); connections[t.id].close(); };
            row.appendChild(btn);
        }
        list.appendChild(row);
    });
}

document.getElementById('btnJoin').addEventListener('click', () => {
    const hostId = document.getElementById('hostIdInput').value.trim();
    initPeer(() => {
        isHost = false;
        hostConn = peer.connect(hostId);
        hostConn.on('data', (data) => {
            if(data.type === 'start') { gameState = data.state; showUI('hud'); }
            else if(data.type === 'sync') { 
                gameState.tanks = data.tanks; gameState.bullets = data.bullets; 
                gameState.particles = data.particles; gameState.scores = data.scores;
                if(data.shake > camera.shake) camera.shake = data.shake;
                updateHUD();
            }
            else if(data.type === 'matchOver') {
                document.getElementById('winnerText').innerText = `${data.winnerName} WINS!`;
                showUI('match-over');
            }
            else if(data.type === 'kicked') { alert("Kicked!"); location.reload(); }
        });
        hostConn.on('open', () => hostConn.send({ type: 'join', name: document.getElementById('playerName').value }));
    });
});

/** * PELILOGIIKKA */
function generateMap(seedStr) {
    const prng = mulberry32(hashString(seedStr));
    gameState.obstacles = [
        {x: -50, y: -50, w: WORLD_SIZE+100, h: 50}, {x: -50, y: WORLD_SIZE, w: WORLD_SIZE+100, h: 50},
        {x: -50, y: 0, w: 50, h: WORLD_SIZE}, {x: WORLD_SIZE, y: 0, w: 50, h: WORLD_SIZE}
    ];
    for(let i=0; i<100; i++) {
        let w = 40 + prng()*100, h = 40 + prng()*100;
        gameState.obstacles.push({x: prng()*(WORLD_SIZE-w), y: prng()*(WORLD_SIZE-h), w, h});
    }
}

function startRound() {
    const spawns = [{x:200,y:200}, {x:WORLD_SIZE-200,y:WORLD_SIZE-200}, {x:WORLD_SIZE-200,y:200}, {x:200,y:WORLD_SIZE-200}];
    let i=0;
    Object.values(gameState.tanks).forEach(t => {
        t.hp = 100; t.x = spawns[i].x; t.y = spawns[i].y; t.vx = 0; t.vy = 0; i++;
    });
    gameState.bullets = []; gameState.particles = []; gameState.roundActive = true;
}

function hostUpdate(dt) {
    if(!gameState.roundActive) return;
    let localShake = 0;

    Object.values(gameState.tanks).forEach(t => {
        if(t.hp <= 0) return;
        if(t.input.a) t.angle -= 0.05; if(t.input.d) t.angle += 0.05;
        const accel = 0.5, friction = 0.85;
        if(t.input.w) { t.vx += Math.cos(t.angle)*accel; t.vy += Math.sin(t.angle)*accel; }
        if(t.input.s) { t.vx -= Math.cos(t.angle)*accel; t.vy -= Math.sin(t.angle)*accel; }
        t.vx *= friction; t.vy *= friction;
        t.x += t.vx; t.y += t.vy;
        t.turretAngle = t.input.turretAngle || t.angle;

        gameState.obstacles.forEach(o => {
            if(t.x+20 > o.x && t.x-20 < o.x+o.w && t.y+20 > o.y && t.y-20 < o.y+o.h) {
                t.x -= t.vx*1.2; t.y -= t.vy*1.2; t.vx = 0; t.vy = 0;
            }
        });

        let weapon = WEAPONS[t.input.weapon-1] || WEAPONS[0];
        if(t.input.shoot && performance.now() - t.lastShot > weapon.reload) {
            t.lastShot = performance.now();
            
            // REKYYLI KORJAUS: Lisätään välitön "tömäys" taaksepäin
            // weapon.recoil on Machine Gunilla 3 ja Giantilla 50.
            // Kerroin 0.8 siirtää Giantilla tankkia noin 40 pikseliä taaksepäin heti.
            const kickBack = weapon.recoil * 0.8;
            t.x -= Math.cos(t.turretAngle) * kickBack;
            t.y -= Math.sin(t.turretAngle) * kickBack;
            
            // Lisätään myös liike-energiaa
            t.vx -= Math.cos(t.turretAngle) * (weapon.recoil * 0.2);
            t.vy -= Math.sin(t.turretAngle) * (weapon.recoil * 0.2);

            if(weapon.shake > localShake) localShake = weapon.shake;
            gameState.bullets.push({
                x: t.x + Math.cos(t.turretAngle)*30, y: t.y + Math.sin(t.turretAngle)*30,
                vx: Math.cos(t.turretAngle)*weapon.speed, vy: Math.sin(t.turretAngle)*weapon.speed,
                owner: t.id, weapon, life: 150
            });
        }
    });

    for(let i=gameState.bullets.length-1; i>=0; i--) {
        let b = gameState.bullets[i]; b.x += b.vx; b.y += b.vy; b.life--;
        let hit = false;
        gameState.obstacles.forEach(o => { if(b.x > o.x && b.x < o.x+o.w && b.y > o.y && b.y < o.y+o.h) hit = true; });
        Object.values(gameState.tanks).forEach(t => {
            if(t.hp > 0 && t.id !== b.owner && Math.hypot(t.x-b.x, t.y-b.y) < 25) {
                t.hp -= b.weapon.damage; hit = true;
                if(b.weapon.splash > 0) {
                    Object.values(gameState.tanks).forEach(t2 => {
                        let d = Math.hypot(t2.x-b.x, t2.y-b.y);
                        if(d < b.weapon.splash) t2.hp -= b.weapon.damage * (1-d/b.weapon.splash);
                    });
                }
            }
        });
        if(hit || b.life <= 0) gameState.bullets.splice(i, 1);
    }

    let alive = Object.values(gameState.tanks).filter(t => t.hp > 0);
    if(alive.length <= 1 && Object.keys(gameState.tanks).length > 1) {
        gameState.roundActive = false;
        if(alive.length === 1) {
            gameState.scores[alive[0].id]++;
            if(gameState.scores[alive[0].id] >= gameState.boLimit) {
                broadcast({ type: 'matchOver', winnerName: alive[0].name });
                document.getElementById('winnerText').innerText = `${alive[0].name} WINS!`;
                showUI('match-over'); gameState.status = 'gameover'; return;
            }
        }
        setTimeout(() => { if(gameState.status === 'playing') startRound(); }, 3000);
    }
    broadcast({ type: 'sync', tanks: gameState.tanks, bullets: gameState.bullets, particles: gameState.particles, scores: gameState.scores, shake: localShake });
}

/** * RENDERÖINTI */
function updateHUD() {
    let t = gameState.tanks[localPlayerId]; if(!t) return;
    document.getElementById('hpDisplay').innerText = `HP: ${Math.max(0, Math.floor(t.hp))}`;
    let w = WEAPONS[localInput.weapon-1] || WEAPONS[0];
    document.getElementById('weaponDisplay').innerText = `Weapon: ${w.name}`;
    let ready = performance.now() - t.lastShot > w.reload;
    document.getElementById('reloadDisplay').innerText = ready ? "READY" : "RELOADING...";
    document.getElementById('scoreBoard').innerText = Object.values(gameState.tanks).map(p => `${p.name}: ${gameState.scores[p.id]||0}`).join(' | ') + ` (BO${gameState.boLimit})`;
}

function render() {
    ctx.fillStyle = '#111'; ctx.fillRect(0,0,cw,ch);
    if(gameState.status !== 'playing') return;
    let me = gameState.tanks[localPlayerId];
    if(me) {
        let worldX = camera.x + (localInput.mx - cw/2), worldY = camera.y + (localInput.my - ch/2);
        localInput.turretAngle = Math.atan2(worldY - me.y, worldX - me.x);
        if(isHost) me.input = { ...localInput }; else if(hostConn?.open) hostConn.send({ type: 'input', input: localInput });
        camera.x += (me.x - camera.x)*0.1; camera.y += (me.y - camera.y)*0.1;
    }
    let sx = (Math.random()-0.5)*camera.shake, sy = (Math.random()-0.5)*camera.shake; camera.shake *= 0.9;
    ctx.save(); ctx.translate(cw/2-camera.x+sx, ch/2-camera.y+sy);
    ctx.strokeStyle = '#222'; for(let i=0; i<WORLD_SIZE; i+=100) { ctx.strokeRect(i,0,100,WORLD_SIZE); ctx.strokeRect(0,i,WORLD_SIZE,100); }
    gameState.obstacles.forEach(o => { ctx.fillStyle='#333'; ctx.fillRect(o.x,o.y,o.w,o.h); ctx.strokeStyle='#555'; ctx.strokeRect(o.x,o.y,o.w,o.h); });
    gameState.bullets.forEach(b => { ctx.fillStyle='#ffaa00'; ctx.beginPath(); ctx.arc(b.x,b.y,b.weapon.radius,0,Math.PI*2); ctx.fill(); });
    Object.values(gameState.tanks).forEach(t => {
        if(t.hp <= 0) return;
        ctx.save(); ctx.translate(t.x, t.y);
        ctx.fillStyle='#fff'; ctx.fillText(t.name, 0, -35);
        ctx.fillStyle='#f00'; ctx.fillRect(-20,-30,40,4); ctx.fillStyle='#0f0'; ctx.fillRect(-20,-30,40*(t.hp/100),4);
        ctx.rotate(t.angle); ctx.fillStyle=t.color; ctx.fillRect(-20,-15,40,30); ctx.fillStyle='#222'; ctx.fillRect(10,-10,10,20);
        ctx.restore();
        ctx.save(); ctx.translate(t.x,t.y); ctx.rotate(t.turretAngle); ctx.fillStyle='#555'; ctx.fillRect(0,-5,35,10);
        ctx.fillStyle='#777'; ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.fill(); ctx.restore();
    });
    ctx.restore();
    mctx.fillStyle='#000'; mctx.fillRect(0,0,150,150);
    const s = 150/WORLD_SIZE;
    gameState.obstacles.forEach(o => { mctx.fillStyle='#444'; mctx.fillRect(o.x*s,o.y*s,o.w*s,o.h*s); });
    Object.values(gameState.tanks).forEach(t => { if(t.hp>0) { mctx.fillStyle=t.color; mctx.fillRect(t.x*s-2,t.y*s-2,4,4); } });
}

function loop() { if(isHost) hostUpdate(); render(); requestAnimationFrame(loop); }
loop();

document.getElementById('btnBackToMenu').onclick = () => location.reload();
</script>
</body>
</html>
