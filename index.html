<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steel Thunder - Tank Warfare</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
:root{--bg:#1a1e14;--fg:#d4c9a8;--muted:#7a7460;--accent:#8fb33a;--accent2:#c4a43a;--danger:#c44a3a;--card:#2a3020;--border:#3a4030;--p1:#5a8a44;--p2:#8a4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--fg);overflow:hidden;width:100vw;height:100vh;user-select:none}
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}
#menu-screen{background:radial-gradient(ellipse at 30% 20%,rgba(143,179,58,.08) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(196,164,58,.06) 0%,transparent 50%),var(--bg)}
.menu-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.menu-bg .line{position:absolute;background:rgba(143,179,58,.04);height:1px;width:100%}
.menu-container{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px 40px;max-width:520px;width:92%;position:relative;z-index:2}
.menu-title{font-family:'Share Tech Mono',monospace;font-size:2rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:4px;margin-bottom:2px}
.menu-subtitle{font-size:.8rem;color:var(--muted);margin-bottom:6px;letter-spacing:2px;text-transform:uppercase}
.peer-status{font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--accent);margin-bottom:18px;display:flex;align-items:center;gap:8px;min-height:18px}
.peer-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulse 2s infinite}
.peer-dot.off{background:var(--danger);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.peer-id-row{display:flex;align-items:center;gap:6px;margin-top:4px}
.peer-id-text{font-size:.62rem;color:var(--accent);word-break:break-all;flex:1;line-height:1.3}
.copy-btn{padding:3px 8px;background:rgba(143,179,58,.12);border:1px solid rgba(143,179,58,.3);border-radius:3px;color:var(--accent);font-family:'Rajdhani',sans-serif;font-size:.7rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s}
.copy-btn:hover{background:rgba(143,179,58,.25)}
.name-input{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--fg);font-family:'Rajdhani',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s;margin-bottom:18px}
.name-input:focus{border-color:var(--accent)}.name-input::placeholder{color:var(--muted)}
.option-group{margin-bottom:16px}
.option-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.option-buttons{display:flex;gap:8px}
.opt-btn{flex:1;padding:8px 6px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--fg);font-family:'Share Tech Mono',monospace;font-size:.74rem;cursor:pointer;transition:all .2s;text-align:center}
.opt-btn:hover{border-color:var(--accent);color:var(--accent)}
.opt-btn.sel{background:rgba(143,179,58,.15);border-color:var(--accent);color:var(--accent);box-shadow:0 0 10px rgba(143,179,58,.08)}
.action-buttons{display:flex;gap:10px;margin-top:22px}
.action-btn{flex:1;padding:12px 16px;border:none;border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.btn-host{background:var(--accent);color:var(--bg)}.btn-host:hover{background:#a0c944}
.btn-join{background:transparent;color:var(--fg);border:1px solid var(--border)}.btn-join:hover{border-color:var(--accent);color:var(--accent)}
#lobby-screen{background:var(--bg)}
.lobby-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:30px 34px;max-width:470px;width:92%;position:relative}
.lobby-title{font-family:'Share Tech Mono',monospace;font-size:1.15rem;color:var(--accent);margin-bottom:14px;text-transform:uppercase;letter-spacing:2px}
.lobby-info{font-size:.8rem;color:var(--muted);margin-bottom:6px;line-height:1.4}
.lobby-info strong{color:var(--fg)}
.id-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.id-text{flex:1;font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--accent);word-break:break-all;line-height:1.4}
.id-copy{padding:5px 10px;background:rgba(143,179,58,.15);border:1px solid var(--accent);border-radius:4px;color:var(--accent);font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s}
.id-copy:hover{background:rgba(143,179,58,.25)}
.join-input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--fg);font-family:'Share Tech Mono',monospace;font-size:.76rem;outline:none;transition:border-color .2s;margin-bottom:8px}
.join-input:focus{border-color:var(--accent)}.join-input::placeholder{color:var(--muted)}
.lobby-div{height:1px;background:var(--border);margin:12px 0}
.lobby-settings{display:flex;justify-content:center;gap:16px;font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--muted);margin-bottom:4px}
.player-list{margin:12px 0}
.player-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;margin-bottom:4px;background:rgba(0,0,0,.15)}
.pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pname{flex:1;font-size:.88rem}
.prole{color:var(--muted);font-size:.72rem}
.kick-btn{padding:3px 10px;background:rgba(196,74,58,.15);border:1px solid var(--danger);border-radius:4px;color:var(--danger);font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s}
.kick-btn:hover{background:rgba(196,74,58,.3)}
.lobby-btn{width:100%;padding:10px;background:var(--accent);color:var(--bg);border:none;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all .2s;margin-bottom:5px}
.lobby-btn:hover{background:#a0c944}.lobby-btn:disabled{opacity:.3;cursor:not-allowed}
.lobby-btn-sec{background:transparent;color:var(--fg);border:1px solid var(--border)}.lobby-btn-sec:hover{border-color:var(--accent);color:var(--accent)}
.lobby-status{text-align:center;padding:14px 0}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.lobby-status p{color:var(--muted);font-size:.82rem}
#game-screen{background:#000}
#game-canvas{display:block;width:100vw;height:100vh;cursor:crosshair}
.hud{position:absolute;pointer-events:none}
.hud-top{top:0;left:0;right:0;display:flex;justify-content:center;padding:8px 14px}
.hud-bar{background:rgba(26,30,20,.88);border:1px solid var(--border);border-radius:8px;padding:4px 20px;display:flex;align-items:center;gap:12px;font-family:'Share Tech Mono',monospace}
.hp-name{display:flex;align-items:center;gap:4px}
.hp-label{font-size:.65rem;color:var(--muted)}
.hp-score{font-size:1.3rem;font-weight:700}
.c1{color:var(--p1)}.c2{color:var(--p2)}
.hud-rnd{font-size:.65rem;color:var(--muted);text-align:center;line-height:1.3}
.hud-rnd span{display:block;font-size:.78rem;color:var(--fg)}
.hud-bl{bottom:16px;left:16px}
.hb-wrap{width:160px}
.hb-lbl{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--muted);margin-bottom:2px}
.hb-bg{height:5px;background:rgba(0,0,0,.6);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.hb-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.hb-fill.low{background:var(--danger)}
.hud-weapon{position:absolute;bottom:20px;right:20px;pointer-events:none;display:flex;align-items:center;gap:12px}
.weapon-box{background:rgba(26,30,20,.88);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:14px}
.reload-ring{position:relative;width:52px;height:52px;flex-shrink:0}
.reload-ring canvas{width:52px;height:52px}
.reload-ring .rl-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:.85rem;color:var(--fg);font-weight:700}
.weapon-info{text-align:left}
.weapon-name{font-family:'Share Tech Mono',monospace;font-size:.82rem;color:var(--accent);font-weight:700;margin-bottom:2px}
.weapon-ammo{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--muted)}
.weapon-slots{display:flex;gap:4px;margin-top:4px}
.w-slot{padding:2px 6px;border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:.6rem;border:1px solid var(--border);color:var(--muted)}
.w-slot.active{border-color:var(--accent);color:var(--accent);background:rgba(143,179,58,.1)}
.hud-ctrl{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:.55rem;color:rgba(255,255,255,.18);pointer-events:none}
#overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.75);z-index:100}
#overlay.active{display:flex}
.ol-content{text-align:center}
.ol-title{font-family:'Share Tech Mono',monospace;font-size:2.5rem;font-weight:700;margin-bottom:4px}
.ol-sub{font-size:.9rem;color:var(--muted);margin-bottom:16px;line-height:1.4}
.ol-btn{padding:10px 26px;background:var(--accent);color:var(--bg);border:none;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;pointer-events:all;text-transform:uppercase;letter-spacing:1px;transition:all .2s}
.ol-btn:hover{background:#a0c944}
.cd-num{font-family:'Share Tech Mono',monospace;font-size:6rem;color:var(--accent);text-shadow:0 0 40px rgba(143,179,58,.3);line-height:1}
#dmg-flash{position:absolute;inset:0;background:rgba(196,74,58,.3);pointer-events:none;opacity:0;transition:opacity .08s;z-index:50}
#dmg-flash.on{opacity:1}
.toast-el{position:absolute;top:60px;left:50%;transform:translateX(-50%);padding:6px 16px;border-radius:5px;font-size:.8rem;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;color:#fff}
.toast-el.show{opacity:1}
.toast-el.err{background:rgba(196,74,58,.92)}
.toast-el.ok{background:rgba(143,179,58,.92)}
</style>
</head>
<body>

<div id="menu-screen" class="screen active">
  <div class="menu-bg" id="menu-bg"></div>
  <div class="menu-container">
    <div class="menu-title">Steel Thunder</div>
    <div class="menu-subtitle">Tank Warfare</div>
    <div class="peer-status" id="peer-status"><span class="peer-dot off" id="peer-dot"></span><span id="peer-text">Connecting to PeerJS...</span></div>
    <input class="name-input" id="name-input" type="text" placeholder="Enter your name" maxlength="16" autocomplete="off">
    <div class="option-group">
      <div class="option-label">Map Size</div>
      <div class="option-buttons" id="map-opts">
        <button class="opt-btn sel" data-val="2000">2000 x 2000</button>
        <button class="opt-btn" data-val="4k">4K (3840x2160)</button>
      </div>
    </div>
    <div class="option-group">
      <div class="option-label">Best Of</div>
      <div class="option-buttons" id="bo-opts">
        <button class="opt-btn" data-val="3">3</button>
        <button class="opt-btn sel" data-val="5">5</button>
        <button class="opt-btn" data-val="10">10</button>
      </div>
    </div>
    <div class="action-buttons">
      <button class="action-btn btn-host" id="btn-host">Host Game</button>
      <button class="action-btn btn-join" id="btn-join">Join Game</button>
    </div>
  </div>
</div>

<div id="lobby-screen" class="screen">
  <div class="lobby-box" id="lobby-box"></div>
</div>

<div id="game-screen" class="screen">
  <canvas id="game-canvas"></canvas>
  <div class="hud hud-top" id="hud-top"></div>
  <div class="hud hud-bl" id="hud-hp"></div>
  <div class="hud-weapon" id="hud-weapon"></div>
  <div class="hud-ctrl">WASD Move &middot; Mouse Aim &middot; Click Shoot &middot; 1-4 Switch Gun</div>
  <div id="dmg-flash"></div>
  <div class="toast-el" id="toast-el"></div>
</div>

<div id="overlay"><div class="ol-content" id="ol-content"></div></div>

<script>
/* ===== CONFIG ===== */
const CFG={WALL:40,MAPS:{'2000':{w:2000,h:2000},'4k':{w:3840,h:2160}},
  GUNS:[
    {id:'mg',name:'Machine Gun',dmg:8,speed:14,cd:100,mag:30,reload:1500,color:'#ffcc44'},
    {id:'20mm',name:'20mm Cannon',dmg:18,speed:11,cd:250,mag:15,reload:2200,color:'#ff9944'},
    {id:'50mm',name:'50mm Cannon',dmg:35,speed:8,cd:600,mag:6,reload:3000,color:'#ff6644'},
    {id:'150mm',name:'150mm Cannon',dmg:80,speed:5,cd:1800,mag:1,reload:4000,color:'#ff4444'}
  ]};

/* ===== SOUND ===== */
class Snd{
  constructor(){this.c=null;this.nb=null;this.lc=0;this.lk=0}
  init(){if(this.c)return;this.c=new(window.AudioContext||window.webkitAudioContext)();const sr=this.c.sampleRate,b=this.c.createBuffer(1,sr,sr),d=b.getChannelData(0);for(let i=0;i<sr;i++)d[i]=Math.random()*2-1;this.nb=b}
  resume(){if(this.c&&this.c.state==='suspended')this.c.resume()}
  _n(){const s=this.c.createBufferSource();s.buffer=this.nb;s.loop=false;return s}
  clank(){if(!this.c)return;const t=this.c.currentTime;if(t-this.lc<.18)return;this.lc=t;const o=this.c.createOscillator();o.type='triangle';o.frequency.setValueAtTime(1100+Math.random()*700,t);o.frequency.exponentialRampToValueAtTime(250,t+.06);const g=this.c.createGain();g.gain.setValueAtTime(.09,t);g.gain.exponentialRampToValueAtTime(.001,t+.07);const n=this._n(),ng=this.c.createGain();ng.gain.setValueAtTime(.05,t);ng.gain.exponentialRampToValueAtTime(.001,t+.04);const f=this.c.createBiquadFilter();f.type='bandpass';f.frequency.value=3000;f.Q.value=3;o.connect(g).connect(this.c.destination);n.connect(f).connect(ng).connect(this.c.destination);o.start(t);o.stop(t+.07);n.start(t);n.stop(t+.05);if(Math.random()<.12&&t-this.lk>.6)this.klonk()}
  klonk(){if(!this.c)return;const t=this.c.currentTime;this.lk=t;const o=this.c.createOscillator();o.type='sine';o.frequency.setValueAtTime(280+Math.random()*80,t);o.frequency.exponentialRampToValueAtTime(60,t+.18);const g=this.c.createGain();g.gain.setValueAtTime(.16,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);const n=this._n(),ng=this.c.createGain();ng.gain.setValueAtTime(.1,t);ng.gain.exponentialRampToValueAtTime(.001,t+.07);const f=this.c.createBiquadFilter();f.type='lowpass';f.frequency.value=900;o.connect(g).connect(this.c.destination);n.connect(f).connect(ng).connect(this.c.destination);o.start(t);o.stop(t+.2);n.start(t);n.stop(t+.08)}
  grind(){if(!this.c)return;const t=this.c.currentTime;const n=this._n(),g=this.c.createGain();g.gain.setValueAtTime(.025,t);g.gain.exponentialRampToValueAtTime(.001,t+.025);const f=this.c.createBiquadFilter();f.type='highpass';f.frequency.value=4000;f.Q.value=2;n.connect(f).connect(g).connect(this.c.destination);n.start(t);n.stop(t+.03)}
  fire(gun){if(!this.c)return;const t=this.c.currentTime;const n=this._n(),ng=this.c.createGain();const vol=.15+gun.dmg*.004;ng.gain.setValueAtTime(vol,t);ng.gain.exponentialRampToValueAtTime(.001,t+.15);const f=this.c.createBiquadFilter();f.type='bandpass';f.frequency.value=600+gun.dmg*3;f.Q.value=1;n.connect(f).connect(ng).connect(this.c.destination);n.start(t);n.stop(t+.15);const o=this.c.createOscillator();o.type='sine';o.frequency.setValueAtTime(120-gun.dmg*.5,t);o.frequency.exponentialRampToValueAtTime(30,t+.3);const og=this.c.createGain();og.gain.setValueAtTime(.15+gun.dmg*.002,t);og.gain.exponentialRampToValueAtTime(.001,t+.3);o.connect(og).connect(this.c.destination);o.start(t);o.stop(t+.3)}
  impact(){if(!this.c)return;const t=this.c.currentTime;const o=this.c.createOscillator();o.type='triangle';o.frequency.setValueAtTime(1800+Math.random()*600,t);o.frequency.exponentialRampToValueAtTime(400,t+.08);const g=this.c.createGain();g.gain.setValueAtTime(.14,t);g.gain.exponentialRampToValueAtTime(.001,t+.1);o.connect(g).connect(this.c.destination);o.start(t);o.stop(t+.1)}
  explode(){if(!this.c)return;const t=this.c.currentTime;const n=this._n(),ng=this.c.createGain();ng.gain.setValueAtTime(.38,t);ng.gain.exponentialRampToValueAtTime(.001,t+.6);const f=this.c.createBiquadFilter();f.type='lowpass';f.frequency.setValueAtTime(2000,t);f.frequency.exponentialRampToValueAtTime(100,t+.5);n.connect(f).connect(ng).connect(this.c.destination);n.start(t);n.stop(t+.6);const o=this.c.createOscillator();o.type='sine';o.frequency.setValueAtTime(60,t);o.frequency.exponentialRampToValueAtTime(20,t+.5);const og=this.c.createGain();og.gain.setValueAtTime(.28,t);og.gain.exponentialRampToValueAtTime(.001,t+.5);o.connect(og).connect(this.c.destination);o.start(t);o.stop(t+.5)}
  horn(){if(!this.c)return;const t=this.c.currentTime;[440,554,659].forEach(fr=>{const o=this.c.createOscillator();o.type='square';o.frequency.value=fr;const g=this.c.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.06,t+.05);g.gain.setValueAtTime(.06,t+.2);g.gain.exponentialRampToValueAtTime(.001,t+.4);const f=this.c.createBiquadFilter();f.type='lowpass';f.frequency.value=1200;o.connect(f).connect(g).connect(this.c.destination);o.start(t);o.stop(t+.4)})}
  reload(){if(!this.c)return;const t=this.c.currentTime;const o=this.c.createOscillator();o.type='square';o.frequency.setValueAtTime(200,t);o.frequency.setValueAtTime(300,t+.05);const g=this.c.createGain();g.gain.setValueAtTime(.04,t);g.gain.exponentialRampToValueAtTime(.001,t+.1);const f=this.c.createBiquadFilter();f.type='lowpass';f.frequency.value=600;o.connect(f).connect(g).connect(this.c.destination);o.start(t);o.stop(t+.1)}
}
const snd=new Snd();

/* ===== NETWORK ===== */
class Net{
  constructor(){this.isHost=false;this.myId=-1;this.myName='';this.peerName='';this.peerId=null;this.connected=false;this._kicking=false;this.onMsg=null;this.onConn=null;this.onDisc=null;this.onPlayerJoin=null;this.onKickDone=null;this.peer=null;this.conn=null}
  host(settings,name){
    return new Promise((res,rej)=>{
      this.isHost=true;this.myId=0;this.myName=name;
      this.peer=new Peer();
      this.peer.on('open',id=>{this.peerId=id;res(id)});
      this.peer.on('connection',c=>this._setupConn(c));
      this.peer.on('error',e=>rej(e));
    });
  }
  join(hostId,name){
    return new Promise((res,rej)=>{
      this.isHost=false;this.myId=1;this.myName=name;
      this.peer=new Peer();
      this.peer.on('open',()=>{
        this.conn=this.peer.connect(hostId,{reliable:false});
        this._setupConn(this.conn);
        const handler=()=>{this.conn.off('open',handler);this.conn.send({type:'hello',name});res()};
        this.conn.on('open',handler);
        const errHandler=()=>{this.conn.off('error',errHandler);rej(new Error('connect-fail'))};
        this.conn.on('error',errHandler);
      });
      this.peer.on('error',e=>rej(e));
    });
  }
  _setupConn(c){
    if(this.conn&&this.conn.open){c.on('open',()=>{c.send({type:'room_full'});setTimeout(()=>{try{c.close()}catch(e){}},200)});return}
    this.conn=c;
    c.on('data',d=>{
      if(d.type==='hello'&&this.isHost){this.peerName=d.name;this.connected=true;c.send({type:'welcome',settings:G.settings,mapKey:G.mapKey,hostName:this.myName});if(this.onPlayerJoin)this.onPlayerJoin(d.name);if(this.onConn)this.onConn();return}
      if(d.type==='welcome'&&!this.isHost){G.settings=d.settings;G.mapKey=d.mapKey;this.peerName=d.hostName;this.connected=true;if(this.onConn)this.onConn();return}
      if(d.type==='kicked'){this.connected=false;toast('You were kicked',true);setTimeout(()=>backToMenu(),800);return}
      if(d.type==='room_full'){toast('Room is full',true);return}
      if(d.type==='start_game'){startGame();return}
      if(this.onMsg)this.onMsg(d);
    });
    c.on('close',()=>{if(!this._kicking){this.connected=false;this.conn=null;this.peerName='';if(this.onDisc)this.onDisc()}else{this.conn=null}});

/* ===== PHYSICS ===== */
const SPEED=1.2,REVERSE=.6,TURN=0.022;
function updateTank(tank,inp){
  if(!tank.alive)return;const R=26,T=CFG.WALL;let moved=false;
  if(inp.l)tank.ba-=TURN;if(inp.r)tank.ba+=TURN;
  let spd=0;if(inp.u){spd=SPEED;moved=true}if(inp.d){spd=-REVERSE;moved=true}
  if(spd!==0){tank.x+=Math.cos(tank.ba)*spd;tank.y+=Math.sin(tank.ba)*spd;tank.tp+=spd*.15}
  tank.moving=moved;
  const mnX=T+R,mxX=G.mapW-T-R,mnY=T+R,mxY=G.mapH-T-R;
  tank.x=Math.max(mnX,Math.min(mxX,tank.x));tank.y=Math.max(mnY,Math.min(mxY,tank.y));
  G.obstacles.forEach(ob=>{
    if(ob.t==='w')return;
    const cx=Math.max(ob.x,Math.min(ob.x+ob.w,tank.x)),cy=Math.max(ob.y,Math.min(ob.y+ob.h,tank.y));
    const dx=tank.x-cx,dy=tank.y-cy,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<R&&dist>0){const p=R-dist;tank.x+=dx/dist*p;tank.y+=dy/dist*p}
    else if(dist===0){const tl=tank.x-ob.x,tr=ob.x+ob.w-tank.x,tt=tank.y-ob.y,tb=ob.y+ob.h-tank.y;const m=Math.min(tl,tr,tt,tb);if(m===tl)tank.x=ob.x-R;else if(m===tr)tank.x=ob.x+ob.w+R;else if(m===tt)tank.y=ob.y-R;else tank.y=ob.y+ob.h+R}
    tank.x=Math.max(mnX,Math.min(mxX,tank.x));tank.y=Math.max(mnY,Math.min(mxY,tank.y));
  });
  if(tank===G.myTank){const wmx=mx+G.cam.x,wmy=my+G.cam.y;tank.ta=Math.atan2(wmy-tank.y,wmx-tank.x)}
}
function tryFire(){

function drawTank(tank){

  if(ammoEl)ammoEl.textContent=`${G.ammo[mid]} / ${gun.mag}`;
  if(lbl)lbl.textContent=G.reloading[mid]?'R':G.ammo[mid];
  if(!rlCtx)return;
  const c=rlCtx,w=104,h=104,cx=52,cy=52,r=42;
  c.clearRect(0,0,w,h);
  // Background ring
  c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.strokeStyle='rgba(255,255,255,0.08)';c.lineWidth=6;c.stroke();
  // Progress ring
  if(G.reloading[mid]){
    const elapsed=performance.now()-G.reloadStart[mid];
    const progress=Math.min(1,elapsed/gun.reload);
    c.beginPath();c.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+progress*Math.PI*2);c.strokeStyle=gun.color;c.lineWidth=6;c.lineCap='round';c.stroke();c.lineCap='butt';
  }else{
    const ratio=G.ammo[mid]/gun.mag;
    if(ratio>0){c.beginPath();c.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+ratio*Math.PI*2);c.strokeStyle=gun.color;c.lineWidth=6;c.lineCap='round';c.stroke();c.lineCap='butt'}
  }
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

/* ===== UI ===== */
function showScr(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function showOL(h){document.getElementById('ol-content').innerHTML=h;document.getElementById('overlay').classList.add('active')}
function hideOL(){document.getElementById('overlay').classList.remove('active')}
function showCD(n){showOL(`<div class="cd-num">${n}</div>`)}
function toast(msg,isErr){const t=document.getElementById('toast-el');t.textContent=msg;t.className='toast-el show '+(isErr?'err':'ok');setTimeout(()=>t.className='toast-el',2500)}
function flashDmg(){const e=document.getElementById('dmg-flash');e.classList.add('on');setTimeout(()=>e.classList.remove('on'),120)}
function backToMenu(){hideOL();net.destroy();G.state='menu';if(raf){cancelAnimationFrame(raf);raf=null}showScr('menu-screen')}

/* ===== MENU ===== */
function setupMenu(){
  const bg=document.getElementById('menu-bg');for(let i=0;i<20;i++){const l=document.createElement('div');l.className='line';l.style.top=(i*5.2)+'%';l.style.opacity=.3+Math.random()*.4;bg.appendChild(l)}
  function wire(gid,key,pars){document.getElementById(gid).querySelectorAll('.opt-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.getElementById(gid).querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');menuCfg[key]=pars?parseInt(btn.dataset.val):btn.dataset.val})})}
  wire('map-opts','mapKey',false);wire('bo-opts','bestOf',true);

  // Host button
  document.getElementById('btn-host').addEventListener('click',function(){
    const name=document.getElementById('name-input').value.trim();
    if(!name){toast('Enter your name first',true);document.getElementById('name-input').focus();return}
    snd.init();snd.resume();
    menuCfg.name=name;G.settings.bestOf=menuCfg.bestOf;G.mapKey=menuCfg.mapKey;
    const m=CFG.MAPS[G.mapKey];G.mapW=m.w;G.mapH=m.h;
    this.disabled=true;this.textContent='Creating...';
    net.host(G.settings,name).then(id=>{
      this.disabled=false;this.textContent='Host Game';
      showScr('lobby-screen');
      renderHostLobby(id);
    }).catch(e=>{
      this.disabled=false;this.textContent='Host Game';
      console.error('Host error:',e);
      if(e.type==='unavailable-id')toast('ID unavailable, retry',true);
      else if(e.type==='network'||e.type==='server-error')toast('Cannot reach server',true);
      else toast('Failed: '+e.type,true);
    });
  });

  // Join button
  document.getElementById('btn-join').addEventListener('click',function(){
    const name=document.getElementById('name-input').value.trim();
    if(!name){toast('Enter your name first',true);document.getElementById('name-input').focus();return}
    snd.init();snd.resume();
    menuCfg.name=name;
    showScr('lobby-screen');
    renderJoinInputLobby();
  });

  // Init PeerJS on load to show ID
  initPeerForMenu();
}

let menuPeer=null;
function initPeerForMenu(){
  const dot=document.getElementById('peer-dot');
  const txt=document.getElementById('peer-text');
  try{
    menuPeer=new Peer();
    menuPeer.on('open',id=>{
      dot.classList.remove('off');txt.innerHTML='Online &mdash; ID: ';
      const row=document.createElement('span');row.className='peer-id-row';
      row.innerHTML=`<span class="peer-id-text" id="menu-pid">${esc(id)}</span><button class="copy-btn" onclick="copyMenuId()">Copy</button>`;
      txt.appendChild(row);
    });
    menuPeer.on('error',()=>{
      dot.classList.remove('off');dot.classList.add('off');txt.textContent='PeerJS connection failed';
    });
  }catch(e){txt.textContent='PeerJS not loaded'}
}
function copyMenuId(){
  const el=document.getElementById('menu-pid');if(!el)return;
  navigator.clipboard.writeText(el.textContent).then(()=>toast('ID copied')).catch(()=>{
    const r=document.createRange();r.selectNode(el);window.getSelection().removeAllRanges();window.getSelection().addRange(r);document.execCommand('copy');toast('ID copied');
  });
}

/* ===== LOBBY ===== */
function renderHostLobby(peerId){
  const box=document.getElementById('lobby-box');
  box.innerHTML=`
    <div class="lobby-title">Lobby</div>
    <div class="lobby-info">Your Game ID:</div>
    <div class="id-box"><span class="id-text" id="lobby-pid">${esc(peerId)}</span><button class="id-copy" onclick="copyLobbyId()">Copy</button></div>
    <div class="lobby-info" style="margin-top:4px">Share this ID with the other player.</div>
    <div class="lobby-div"></div>
    <div class="lobby-settings"><span>Map: ${G.mapW}x${G.mapH}</span><span>Best of ${G.settings.bestOf}</span></div>
    <div class="lobby-div"></div>
    <div class="player-list" id="host-players">
      <div class="player-row"><span class="pdot" style="background:var(--p1)"></span><span class="pname">${esc(net.myName)} <span class="prole">(Host)</span></span></div>
      <div class="player-row"><span class="pdot" style="background:var(--muted)"></span><span class="pname" style="color:var(--muted)">Waiting for player...</span></div>
    </div>
    <button class="lobby-btn" id="btn-start" onclick="hostStart()">Start Game</button>
    <button class="lobby-btn lobby-btn-sec" onclick="backToMenu()">Cancel</button>`;
}
function copyLobbyId(){
  const el=document.getElementById('lobby-pid');if(!el)return;
  navigator.clipboard.writeText(el.textContent).then(()=>toast('ID copied')).catch(()=>{
    const r=document.createRange();r.selectNode(el);window.getSelection().removeAllRanges();window.getSelection().addRange(r);document.execCommand('copy');toast('ID copied');
  });
}
function updateHostPlayers(){
  const el=document.getElementById('host-players');if(!el)return;
  const has=net.connected&&net.peerName;
  el.innerHTML=`
    <div class="player-row"><span class="pdot" style="background:var(--p1)"></span><span class="pname">${esc(net.myName)} <span class="prole">(Host)</span></span></div>
    <div class="player-row"><span class="pdot" style="background:${has?'var(--p2)':'var(--muted)'}"></span><span class="pname" style="color:${has?'var(--fg)':'var(--muted)'}">${has?esc(net.peerName):'Waiting for player...'}</span>${has?'<button class="kick-btn" onclick="hostKick()">Kick</button>':''}</div>`;
  const btn=document.getElementById('btn-start');if(btn)btn.disabled=!has;
}
function renderJoinInputLobby(){
  const box=document.getElementById('lobby-box');
  box.innerHTML=`
    <div class="lobby-title">Join Game</div>
    <div class="lobby-info">Enter the host's Game ID:</div>
    <input class="join-input" id="join-id-inp" placeholder="Paste host ID here..." autocomplete="off">
    <button class="lobby-btn" id="btn-do-join">Connect</button>
    <button class="lobby-btn lobby-btn-sec" onclick="backToMenu()">Cancel</button>`;
  document.getElementById('btn-do-join').addEventListener('click',doOnlineJoin);
  document.getElementById('join-id-inp').addEventListener('keydown',e=>{if(e.key==='Enter')doOnlineJoin()});
}
function doOnlineJoin(){
  const inp=document.getElementById('join-id-inp');const btn=document.getElementById('btn-do-join');
  const hostId=inp.value.trim();if(!hostId){toast('Enter the host ID first',true);inp.focus();return}
  btn.disabled=true;btn.textContent='Connecting...';
  net.join(hostId,menuCfg.name).then(()=>{
    renderJoinerLobby();
  }).catch(e=>{
    console.error('Join error:',e);btn.disabled=false;btn.textContent='Connect';
    if(e.type==='peer-unavailable')toast('Host not found. Check the ID.',true);
    else toast('Connection failed: '+e.type,true);
  });
}
function renderJoinerLobby(){
  const box=document.getElementById('lobby-box');
  box.innerHTML=`
    <div class="lobby-title">Lobby</div>
    <div class="lobby-info">Connected to <strong>${esc(net.peerName||'Host')}</strong></div>
    <div class="lobby-settings"><span>Map: ${G.mapW}x${G.mapH}</span><span>Best of ${G.settings.bestOf}</span></div>
    <div class="lobby-div"></div>
    <div class="player-list">
      <div class="player-row"><span class="pdot" style="background:var(--p1)"></span><span class="pname">${esc(net.peerName||'Host')} <span class="prole">(Host)</span></span></div>
      <div class="player-row"><span class="pdot" style="background:var(--p2)"></span><span class="pname">${esc(net.myName)}</span></div>
    </div>
    <div class="lobby-status"><div class="spinner"></div><p>Waiting for host to start...</p></div>
    <button class="lobby-btn lobby-btn-sec" onclick="backToMenu()">Leave</button>`;
}
function hostStart(){if(!net.connected)return;net.send({type:'start_game'});startGame()}
function hostKick(){if(!net.connected)return;const n=net.peerName;net.kick();toast(n+' was kicked');updateHostPlayers()}

/* ===== NET HANDLER ===== */
function setupNetHandler(){
  net.onPlayerJoin=(name)=>{toast(name+' joined');updateHostPlayers()};
  net.onKickDone=()=>{updateHostPlayers()};
  net.onDisc=()=>{
    if(G.state==='playing'||G.state==='countdown'||G.state==='roundEnd'){
      showOL(`<div class="ol-title" style="color:var(--danger)">DISCONNECTED</div><div class="ol-sub">${esc(net.peerName||'Player')} left.</div><button class="ol-btn" onclick="backToMenu()">Back to Menu</button>`);G.state='gameEnd';
    }else if(document.getElementById('lobby-screen').classList.contains('active')){
      if(net.isHost)updateHostPlayers();else{toast('Disconnected from host',true);setTimeout(()=>backToMenu(),500)}
    }
  };
  net.onMsg=(d)=>{
    lastRemoteTime=performance.now();
    if(d.type==='state'&&G.remTank){G.remTank.x=d.x;G.remTank.y=d.y;G.remTank.ba=d.ba;G.remTank.ta=d.ta;G.remTank.hp=d.hp;G.remTank.alive=d.alive;G.remTank.moving=d.moving;G.remTank.tp=d.tp}
    if(d.type==='fire'){G.projectiles.push({x:d.x,y:d.y,vx:d.vx,vy:d.vy,own:d.own,dmg:d.dmg,life:180});G.mFlash[d.own]=performance.now();snd.fire(CFG.GUNS[0])}
    if(d.type==='dead'){if(G.remTank){G.remTank.alive=false;boom(G.remTank.x,G.remTank.y);snd.explode();G.shake=12}checkRoundEnd()}
    if(d.type==='next_round'){initRound()}
  };
}

/* ===== START GAME ===== */
function startGame(){
  const m=CFG.MAPS[G.mapKey];G.mapW=m.w;G.mapH=m.h;
  G.obstacles=genObs(G.mapW,G.mapH);G.groundCvs=mkGround(G.mapW,G.mapH);
  G.scores=[0,0];G.round=0;G.cam={x:0,y:0};lastRemoteTime=performance.now();
  showScr('game-screen');resizeCanvas();initRound();
  lastT=performance.now();if(raf)cancelAnimationFrame(raf);gameLoop(lastT);
}

/* ===== GAME LOOP ===== */
function gameLoop(ts){
  raf=requestAnimationFrame(gameLoop);lastT=ts;
  if(G.state==='countdown'){
    const elapsed=ts-G.cdTime;const nv=3-Math.floor(elapsed/1000);
    if(nv!==G.cdVal&&nv>0){G.cdVal=nv;showCD(nv)}
    if(elapsed>=3500){hideOL();G.state='playing';lastRemoteTime=performance.now()}
    if(G.myTank){const inp=getInput();updateTank(G.myTank,inp);if(G.myTank.moving)snd.clank()}
    render();return;
  }
  if(G.state==='playing'){
    const inp=getInput();updateTank(G.myTank,inp);
    if(G.myTank.moving)snd.clank();
    if(mDown)tryFire();
    updateReload(net.myId);
    if(G.myTank){const wmx=mx+G.cam.x,wmy=my+G.cam.y;const target=Math.atan2(wmy-G.myTank.y,wmx-G.myTank.x);let diff=Math.abs(target-G.myTank.ta);if(diff>Math.PI)diff=2*Math.PI-diff;if(diff>.01&&ts-lastGrindT>120){snd.grind();lastGrindT=ts}}
    updateProj();updatePart();
    net.send({type:'state',x:G.myTank.x,y:G.myTank.y,ba:G.myTank.ba,ta:G.myTank.ta,hp:G.myTank.hp,alive:G.myTank.alive,moving:G.myTank.moving,tp:G.myTank.tp});
    if(lastRemoteTime>0&&performance.now()-lastRemoteTime>5000){
      toast('Player disconnected',true);showOL(`<div class="ol-title" style="color:var(--danger)">DISCONNECTED</div><div class="ol-sub">${esc(net.peerName)} left.</div><button class="ol-btn" onclick="backToMenu()">Back to Menu</button>`);G.state='gameEnd';
    }
    render();updateHUD();updateWeaponHUD();return;
  }
  if(G.state==='roundEnd'){updatePart();render();if(net.isHost&&ts-G.reTime>3000&&G.state!=='gameEnd'){initRound();net.send({type:'next_round'})}return}
  if(G.state==='gameEnd'){updatePart();render();return}
}
function getInput(){return{u:!!keys['w']||!!keys['arrowup'],d:!!keys['s']||!!keys['arrowdown'],l:!!keys['a']||!!keys['arrowleft'],r:!!keys['d']||!!keys['arrowright']}}

/* ===== CANVAS ===== */
function resizeCanvas(){if(!canvas)return;canvas.width=window.innerWidth;canvas.height=window.innerHeight}

/* ===== INPUT ===== */
function setupInput(){
  window.addEventListener('keydown',e=>{
    const k=e.key.toLowerCase();keys[k]=true;
    if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k))e.preventDefault();
    if(k>='1'&&k<='4'&&G.state==='playing'){const idx=parseInt(k)-1;if(idx<CFG.GUNS.length)switchGun(idx)}
  });
  window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});
  window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
  window.addEventListener('mousedown',e=>{if(e.button===0){mDown=true;snd.resume()}});
  window.addEventListener('mouseup',e=>{if(e.button===0)mDown=false});
  window.addEventListener('resize',()=>{if(canvas)resizeCanvas()});
  window.addEventListener('contextmenu',e=>e.preventDefault());
}

/* ===== INIT ===== */
function init(){
  canvas=document.getElementById('game-canvas');ctx=canvas.getContext('2d');
  setupMenu();setupInput();setupNetHandler();
}
window.addEventListener('DOMContentLoaded',init);
</script>
