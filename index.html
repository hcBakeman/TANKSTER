<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Top-Down Tank Combat - FIX</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; color: #fff; font-family: 'Courier New', monospace; user-select: none; }
        canvas { display: block; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 10; }
        .interactive { pointer-events: auto; }
        .panel { background: rgba(10, 10, 10, 0.95); padding: 25px; border: 2px solid #333; border-radius: 4px; box-shadow: 0 0 20px #000; }
        
        #menu, #lobby, #match-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; gap: 12px; min-width: 350px; }
        input, select, button { padding: 12px; font-family: inherit; font-size: 16px; background: #1a1a1a; color: #fff; border: 1px solid #444; }
        button { cursor: pointer; background: #2a2a2a; font-weight: bold; transition: 0.2s; }
        button:hover { background: #444; }
        
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; display: none; z-index: 20; }
        .hud-top { display: flex; justify-content: center; font-size: 28px; font-weight: bold; text-shadow: 3px 3px 0 #000; }
        
        /* HP palkki */
        .hud-left { position: absolute; bottom: 30px; left: 30px; }
        #hp-bar-bg { width: 250px; height: 15px; background: #222; border: 2px solid #444; }
        #hp-bar-fill { width: 100%; height: 100%; background: #2ecc71; transition: width 0.2s; }

        /* KESKITETTY ASENÄYTTÖ - TÄMÄ ON NYT VARMASTI NÄKYVISSÄ */
        .hud-center { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            pointer-events: none;
        }
        .weapon-label { font-size: 32px; font-weight: bold; color: #ff4444; text-transform: uppercase; letter-spacing: 3px; text-shadow: 2px 2px 10px #000; }
        .reload-status { font-size: 18px; color: #aaa; font-weight: bold; height: 20px; }
        
        /* Latausympyrä */
        .loader-container { position: relative; width: 80px; height: 80px; background: rgba(0,0,0,0.5); border-radius: 50%; }
        .loader-svg { transform: rotate(-90deg); width: 80px; height: 80px; }
        .loader-bg { fill: none; stroke: #222; stroke-width: 8; }
        .loader-fill { fill: none; stroke: #0f0; stroke-width: 8; stroke-dasharray: 226; stroke-dashoffset: 226; transition: stroke-dashoffset 0.1s linear; }

        #minimap-container { position: absolute; bottom: 30px; right: 30px; width: 180px; height: 180px; border: 2px solid #444; background: rgba(0,0,0,0.8); }
        #minimap { width: 100%; height: 100%; }
        
        .hidden { display: none !important; }
        .player-row { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 10px; border: 1px solid #333; margin-top: 5px; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer">
        <div id="menu" class="panel interactive">
            <h1 style="color: #ff4444; text-align: center;">TANK BATTALION</h1>
            <label>NIMI:</label><input type="text" id="playerName" value="COMMANDER">
            <label>SEED:</label><input type="text" id="mapSeed" value="GAMMA_9">
            <label>MODE:</label>
            <select id="matchMode"><option value="3">BEST OF 3</option><option value="5">BEST OF 5</option></select>
            <button id="btnHost" style="background: #b91d1d;">HOST GAME</button>
            <input type="text" id="hostIdInput" placeholder="JOIN ID TÄHÄN">
            <button id="btnJoin">JOIN GAME</button>
            <p id="menuStatus" style="color: #666; text-align: center; font-size: 12px;"></p>
        </div>

        <div id="lobby" class="panel interactive hidden">
            <h2>WAR ROOM</h2>
            <p>JOIN ID: <strong id="displayHostId" style="color: #0f0;"></strong></p>
            <div id="playerList"></div>
            <button id="btnStartGame" style="background:#065f46; margin-top:20px;">DEPLOY UNITS</button>
        </div>

        <div id="hud">
            <div class="hud-top" id="scoreBoard">P1: 0 | P2: 0</div>
            
            <div class="hud-left">
                <div id="hp-bar-bg"><div id="hp-bar-fill"></div></div>
            </div>

            <div class="hud-center">
                <div id="weaponDisplay" class="weapon-label">20mm CANNON</div>
                <div class="loader-container">
                    <svg class="loader-svg">
                        <circle class="loader-bg" cx="40" cy="40" r="36"></circle>
                        <circle id="reload-circle" class="loader-fill" cx="40" cy="40" r="36"></circle>
                    </svg>
                </div>
                <div id="reload-text" class="reload-status">READY</div>
            </div>

            <div id="minimap-container"><canvas id="minimap"></canvas></div>
        </div>

        <div id="match-over" class="panel interactive hidden">
            <h1 id="winnerText" style="color: #f1c40f;">VICTORY!</h1>
            <button id="btnBackToMenu">RETURN TO BASE</button>
        </div>
    </div>

<script>
/** * AUDIO ENGINE */
const AudioEngine = {
    ctx: null, engineOsc: null, engineGain: null,
    init() {
        if(this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.engineOsc = this.ctx.createOscillator();
        this.engineGain = this.ctx.createGain();
        this.engineOsc.type = 'sawtooth';
        this.engineOsc.frequency.setValueAtTime(30, this.ctx.currentTime);
        this.engineGain.gain.setValueAtTime(0, this.ctx.currentTime);
        const lpf = this.ctx.createBiquadFilter();
        lpf.type = 'lowpass'; lpf.frequency.value = 120;
        this.engineOsc.connect(lpf).connect(this.engineGain).connect(this.ctx.destination);
        this.engineOsc.start();
    },
    updateEngine(speed) {
        if(!this.ctx) return;
        const freq = 30 + (speed * 18);
        const vol = 0.01 + (speed * 0.05);
        this.engineOsc.frequency.setTargetAtTime(freq, this.ctx.currentTime, 0.1);
        this.engineGain.gain.setTargetAtTime(vol, this.ctx.currentTime, 0.1);
    },
    playShot(weaponId) {
        if(!this.ctx) return;
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        o.connect(g).connect(this.ctx.destination);
        o.frequency.setValueAtTime(weaponId === 1 ? 150 : 100 - (weaponId*15), this.ctx.currentTime);
        g.gain.setValueAtTime(0.3, this.ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
        o.start(); o.stop(this.ctx.currentTime + 0.3);
    }
};

/** * GLOBALS */
const WORLD_SIZE = 2000;
const WEAPONS = [
    { id: 1, name: "MACHINE GUN", damage: 5, speed: 25, reload: 100, radius: 3, shake: 0.5 },
    { id: 2, name: "20mm CANNON", damage: 20, speed: 18, reload: 600, radius: 5, shake: 3 },
    { id: 3, name: "50mm CANNON", damage: 50, speed: 14, reload: 1500, radius: 8, shake: 8 },
    { id: 4, name: "150mm GIANT", damage: 100, speed: 10, reload: 3800, radius: 12, shake: 25 }
];

let gameState = { status: 'menu', tanks: {}, bullets: [], obstacles: [], scores: {}, boLimit: 3, roundActive: false };
let localInput = { w: false, a: false, s: false, d: false, mx: 0, my: 0, shoot: false, weapon: 1 };
let localPlayerId = null;
let camera = { x: 1000, y: 1000, shake: 0 };
let peer = null, isHost = false, connections = {}, hostConn = null;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let cw = canvas.width = window.innerWidth;
let ch = canvas.height = window.innerHeight;

function showUI(id) {
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('lobby').classList.add('hidden');
    document.getElementById('hud').classList.add('hidden');
    document.getElementById('match-over').classList.add('hidden');
    document.getElementById(id).classList.remove('hidden');
}

// MULTIPLAYER FIX - JOIN LOGIC
function initPeer(cb) {
    peer = new Peer();
    peer.on('open', (id) => { localPlayerId = id; cb(); });
}

document.getElementById('btnHost').onclick = () => {
    initPeer(() => {
        isHost = true; gameState.status = 'lobby';
        generateMap(document.getElementById('mapSeed').value);
        addPlayer(localPlayerId, document.getElementById('playerName').value, 0);
        document.getElementById('displayHostId').innerText = localPlayerId;
        showUI('lobby');
        peer.on('connection', c => {
            connections[c.peer] = c;
            c.on('data', d => {
                if(d.type === 'join') {
                    addPlayer(c.peer, d.name, Object.keys(gameState.tanks).length);
                    broadcast({type:'lobbySync', tanks: gameState.tanks});
                    updateLobbyList();
                } else if(d.type === 'input') { if(gameState.tanks[c.peer]) gameState.tanks[c.peer].input = d.input; }
            });
        });
    });
};

document.getElementById('btnJoin').onclick = () => {
    const hId = document.getElementById('hostIdInput').value;
    initPeer(() => {
        hostConn = peer.connect(hId);
        hostConn.on('open', () => hostConn.send({type:'join', name:document.getElementById('playerName').value}));
        hostConn.on('data', d => {
            if(d.type === 'lobbySync') showUI('lobby');
            if(d.type === 'start') { gameState = d.state; showUI('hud'); }
            if(d.type === 'sync') { 
                gameState.tanks = d.tanks; gameState.bullets = d.bullets; gameState.scores = d.scores;
                if(d.shake > camera.shake) camera.shake = d.shake;
                updateHUD();
            }
        });
    });
};

function addPlayer(id, name, idx) {
    gameState.tanks[id] = { id, name, color: ['#ff4444', '#4444ff', '#44ff44', '#ffff44'][idx%4], x:0, y:0, angle:0, hp:100, input:localInput, lastShot:0, vx:0, vy:0 };
    gameState.scores[id] = 0;
}

function broadcast(d) { Object.values(connections).forEach(c => c.open && c.send(d)); }

document.getElementById('btnStartGame').onclick = () => {
    startRound(); gameState.status = 'playing';
    broadcast({type:'start', state: gameState});
    showUI('hud');
};

/** * PHYSICS & BORDER FIX */
function resolveCollision(tank, rect) {
    const margin = 20;
    if (tank.x + margin > rect.x && tank.x - margin < rect.x + rect.w &&
        tank.y + margin > rect.y && tank.y - margin < rect.y + rect.h) {
        let overlaps = [tank.x+margin-rect.x, rect.x+rect.w-(tank.x-margin), tank.y+margin-rect.y, rect.y+rect.h-(tank.y-margin)];
        let min = Math.min(...overlaps);
        if(min === overlaps[0]) tank.x -= min; else if(min === overlaps[1]) tank.x += min;
        else if(min === overlaps[2]) tank.y -= min; else if(min === overlaps[3]) tank.y += min;
    }
}

function generateMap(seed) {
    gameState.obstacles = [
        {x:-100, y:-100, w:WORLD_SIZE+200, h:100}, {x:-100, y:WORLD_SIZE, w:WORLD_SIZE+200, h:100},
        {x:-100, y:0, w:100, h:WORLD_SIZE}, {x:WORLD_SIZE, y:0, w:100, h:WORLD_SIZE}
    ];
}

function startRound() {
    const spawns = [{x:200,y:200},{x:1800,y:1800},{x:1800,y:200},{x:200,y:1800}];
    let i=0; Object.values(gameState.tanks).forEach(t => { 
        t.hp=100; t.x=spawns[i].x; t.y=spawns[i].y; t.vx=0; t.vy=0; i++; 
    });
    gameState.roundActive = true;
}

/** * HUD UPDATE FIX */
function updateHUD() {
    const me = gameState.tanks[localPlayerId];
    if(!me || gameState.status !== 'playing') return;

    // HP
    document.getElementById('hp-bar-fill').style.width = me.hp + '%';

    // ASE JA LATAUS
    const w = WEAPONS[localInput.weapon-1];
    document.getElementById('weaponDisplay').innerText = w.name;
    
    const timeSince = Date.now() - me.lastShot;
    const progress = Math.min(1, timeSince / w.reload);
    
    // SVG ympyrä: dasharray on 2*PI*r = 2*3.14*36 ≈ 226
    const circle = document.getElementById('reload-circle');
    circle.style.strokeDashoffset = 226 - (progress * 226);
    
    if(progress < 1) {
        document.getElementById('reload-text').innerText = "RELOADING...";
        document.getElementById('reload-text').style.color = "#ff4444";
        circle.style.stroke = "#ff4444";
    } else {
        document.getElementById('reload-text').innerText = "READY";
        document.getElementById('reload-text').style.color = "#00ff00";
        circle.style.stroke = "#00ff00";
    }
    
    document.getElementById('scoreBoard').innerText = Object.values(gameState.tanks).map(t => `${t.name}:${gameState.scores[t.id]}`).join(' | ');
}

/** * GAME LOOP */
function hostUpdate() {
    if(!gameState.roundActive) return;
    let s = 0;
    Object.values(gameState.tanks).forEach(t => {
        if(t.hp <= 0) return;
        if(t.input.a) t.angle -= 0.05; if(t.input.d) t.angle += 0.05;
        let speed = 0; if(t.input.w) speed = 4; if(t.input.s) speed = -2;
        t.vx = Math.cos(t.angle) * speed; t.vy = Math.sin(t.angle) * speed;
        t.x += t.vx; t.y += t.vy;
        gameState.obstacles.forEach(o => resolveCollision(t, o));

        let w = WEAPONS[t.input.weapon-1];
        if(t.input.shoot && Date.now() - t.lastShot > w.reload) {
            t.lastShot = Date.now();
            gameState.bullets.push({x:t.x, y:t.y, vx:Math.cos(t.input.turretAngle)*w.speed, vy:Math.sin(t.input.turretAngle)*w.speed, owner:t.id, w});
            s = w.shake;
            AudioEngine.playShot(w.id);
        }
    });

    for(let i=gameState.bullets.length-1; i>=0; i--) {
        let b = gameState.bullets[i]; b.x += b.vx; b.y += b.vy;
        let hit = false;
        Object.values(gameState.tanks).forEach(t => {
            if(t.hp>0 && t.id!==b.owner && Math.hypot(t.x-b.x, t.y-b.y)<25) { t.hp-=b.w.damage; hit=true; }
        });
        if(hit || b.x<0 || b.x>WORLD_SIZE || b.y<0 || b.y>WORLD_SIZE) gameState.bullets.splice(i,1);
    }
    broadcast({type:'sync', tanks:gameState.tanks, bullets:gameState.bullets, scores:gameState.scores, shake:s});
}

function draw() {
    ctx.fillStyle = '#050505'; ctx.fillRect(0,0,cw,ch);
    if(gameState.status !== 'playing') return;
    const me = gameState.tanks[localPlayerId];
    if(me) {
        camera.x += (me.x - camera.x) * 0.1; camera.y += (me.y - camera.y) * 0.1;
        localInput.turretAngle = Math.atan2(localInput.my-ch/2, localInput.mx-cw/2);
        if(!isHost) hostConn.send({type:'input', input:localInput});
        AudioEngine.updateEngine(Math.abs(me.vx)+Math.abs(me.vy));
        updateHUD();
    }
    
    ctx.save();
    ctx.translate(cw/2-camera.x, ch/2-camera.y);
    ctx.strokeStyle = '#f00'; ctx.lineWidth = 5; ctx.strokeRect(0,0,WORLD_SIZE,WORLD_SIZE);
    gameState.bullets.forEach(b => { ctx.fillStyle='#ff0'; ctx.beginPath(); ctx.arc(b.x,b.y,5,0,Math.PI*2); ctx.fill(); });
    Object.values(gameState.tanks).forEach(t => {
        if(t.hp<=0) return;
        ctx.save(); ctx.translate(t.x, t.y); ctx.rotate(t.angle);
        ctx.fillStyle=t.color; ctx.fillRect(-20,-15,40,30); ctx.restore();
    });
    ctx.restore();
}

function loop() { if(isHost) hostUpdate(); draw(); requestAnimationFrame(loop); }
window.onkeydown = e => { 
    AudioEngine.init();
    if(e.key==='w') localInput.w=true; if(e.key==='s') localInput.s=true;
    if(e.key==='a') localInput.a=true; if(e.key==='d') localInput.d=true;
    if(e.key>='1' && e.key<='4') localInput.weapon = parseInt(e.key);
};
window.onkeyup = e => { if(e.key==='w') localInput.w=false; if(e.key==='s') localInput.s=false; if(e.key==='a') localInput.a=false; if(e.key==='d') localInput.d=false; };
window.onmousemove = e => { localInput.mx=e.clientX; localInput.my=e.clientY; };
window.onmousedown = () => localInput.shoot = true;
window.onmouseup = () => localInput.shoot = false;

function updateLobbyList() {
    const list = document.getElementById('playerList'); list.innerHTML = '';
    Object.values(gameState.tanks).forEach(t => {
        list.innerHTML += `<div class="player-row"><span>${t.name}</span> <span style="color:${t.color}">READY</span></div>`;
    });
}

requestAnimationFrame(loop);
</script>
</body>
</html>
